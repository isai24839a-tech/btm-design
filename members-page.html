<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<title>メンバーポータル | BEAT THE MIX</title>
<meta name="description" content="BEAT THE MIX 会員専用ページ。レッスンスケジュール・予約・お知らせ。">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap"></noscript>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --cream: #FBF7F0;
  --charcoal: #1a1a1a;
  --coral: #FF6B35;
  --navy: #0D1B2A;
  --coral-light: #ff8c5e;
  --coral-dark: #e55a28;
  --navy-light: #1B2D45;
  --gray-100: #f5f0e8;
  --gray-200: #e8e0d4;
  --gray-300: #d0c8bc;
  --gray-500: #8a8278;
  --shadow-sm: 0 1px 3px rgba(13, 27, 42, 0.08);
  --shadow-md: 0 4px 12px rgba(13, 27, 42, 0.1);
  --shadow-lg: 0 8px 30px rgba(13, 27, 42, 0.12);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  background-color: var(--cream);
  color: var(--charcoal);
  line-height: 1.7;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background-color 0.4s ease;
}

body.category-future {
  background-color: #ECEEF5;
}

body.category-future .navbar {
  background: rgba(236, 238, 245, 0.92);
}

/* ===== PASSWORD GATE ===== */
#password-gate {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--navy);
  transition: opacity 0.5s ease, visibility 0.5s ease;
  overflow: hidden;
}

#password-gate.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.gate-container {
  text-align: center;
  padding: 2rem;
  max-width: 400px;
  width: 100%;
}

.gate-logo {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 0.3em;
  color: var(--coral);
  margin-bottom: 2.5rem;
  text-transform: uppercase;
}

.gate-title {
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 2.5rem;
  letter-spacing: 0.15em;
  color: #fff;
  margin-bottom: 0.5rem;
}

.gate-subtitle {
  font-size: 0.9rem;
  color: rgba(255, 255, 255, 0.5);
  letter-spacing: 0.1em;
  margin-bottom: 3rem;
  font-weight: 300;
}

.gate-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  align-items: center;
}

.gate-input-wrapper {
  position: relative;
  width: 100%;
  max-width: 300px;
}

.gate-toggle-pw {
  position: absolute;
  right: 52px;
  top: 50%;
  transform: translateY(-50%);
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 50%;
  background: transparent;
  color: rgba(255, 255, 255, 0.6);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.2s ease;
  padding: 0;
}

.gate-toggle-pw:hover {
  color: rgba(255, 255, 255, 0.9);
}

.gate-toggle-pw svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.gate-input {
  width: 100%;
  padding: 14px 84px 14px 20px;
  border: 2px solid rgba(255, 255, 255, 0.15);
  border-radius: 50px;
  background: rgba(255, 255, 255, 0.05);
  color: #fff;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.15em;
  outline: none;
  transition: border-color 0.3s ease, background 0.3s ease;
}

.gate-input::placeholder {
  color: rgba(255, 255, 255, 0.3);
  letter-spacing: 0.05em;
}

.gate-input:focus {
  border-color: var(--coral);
  background: rgba(255, 255, 255, 0.08);
}

.gate-submit {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  width: 40px;
  height: 40px;
  border: none;
  border-radius: 50%;
  background: var(--coral);
  color: #fff;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s ease, transform 0.2s ease;
}

.gate-submit:hover {
  background: var(--coral-light);
}

.gate-submit:active {
  transform: translateY(-50%) scale(0.95);
}

.gate-submit svg {
  width: 18px;
  height: 18px;
  fill: none;
  stroke: #fff;
  stroke-width: 2.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.gate-error {
  color: var(--coral);
  font-size: 0.85rem;
  height: 1.5em;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.gate-error.visible {
  opacity: 1;
}

.gate-input-wrapper.shake {
  animation: shake 0.5s ease-in-out;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  15% { transform: translateX(-8px); }
  30% { transform: translateX(8px); }
  45% { transform: translateX(-6px); }
  60% { transform: translateX(6px); }
  75% { transform: translateX(-3px); }
  90% { transform: translateX(3px); }
}

.gate-decoration {
  position: absolute;
  border-radius: 50%;
  opacity: 0.03;
  background: var(--coral);
}

.gate-decoration-1 {
  width: 400px;
  height: 400px;
  top: -100px;
  right: -100px;
}

.gate-decoration-2 {
  width: 300px;
  height: 300px;
  bottom: -80px;
  left: -80px;
}

/* ===== MAIN CONTENT ===== */
#main-content {
  display: none;
  opacity: 0;
  transition: opacity 0.5s ease;
}

#main-content.visible {
  display: block;
  opacity: 1;
}

/* ===== NAVBAR ===== */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(251, 247, 240, 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--gray-200);
  padding: 0 1.5rem;
}

.navbar-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
}

.navbar-back {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  text-decoration: none;
  color: var(--gray-500);
  font-size: 0.85rem;
  font-weight: 500;
  transition: color 0.2s ease;
}

.navbar-back:hover {
  color: var(--coral);
}

.navbar-back svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.navbar-brand {
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 0.85rem;
  letter-spacing: 0.2em;
  color: var(--navy);
  text-transform: uppercase;
}

.navbar-member-badge {
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  color: var(--coral);
  background: rgba(255, 107, 53, 0.08);
  padding: 4px 10px;
  border-radius: 20px;
  text-transform: uppercase;
}

.navbar-signout {
  background: none;
  border: none;
  color: var(--gray-400);
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 3px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.7rem;
  font-weight: 500;
}

.navbar-signout:hover {
  color: var(--coral);
  background: rgba(255, 107, 53, 0.08);
}

/* ===== TABS ===== */
.tabs-container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 1.5rem 1.5rem 0;
}

.tabs {
  display: flex;
  gap: 0;
  background: var(--gray-100);
  border-radius: var(--radius-md);
  padding: 4px;
  position: relative;
}

.tab-button {
  flex: 1;
  padding: 12px 1.5rem;
  border: none;
  background: transparent;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--gray-500);
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: color 0.3s ease;
  position: relative;
  z-index: 1;
  white-space: nowrap;
}

.tab-button:hover {
  color: var(--charcoal);
}

.tab-button.active {
  color: var(--charcoal);
}

.tab-slider {
  position: absolute;
  top: 4px;
  left: 4px;
  height: calc(100% - 8px);
  background: #fff;
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-sm);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 0;
}

/* ===== TAB PANELS ===== */
.tab-panels {
  max-width: 1100px;
  margin: 0 auto;
  padding: 1.5rem;
}

.tab-panel {
  display: none;
  animation: fadeIn 0.4s ease;
}

.tab-panel.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== CATEGORY TOGGLE (KIDS / FUTURE) ===== */
.category-toggle {
  display: flex;
  gap: 0;
  background: var(--gray-100);
  border-radius: var(--radius-md);
  padding: 4px;
  margin-bottom: 1.5rem;
  max-width: 320px;
}

.category-btn {
  flex: 1;
  padding: 10px 1.5rem;
  border: none;
  background: transparent;
  font-family: 'Oswald', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--gray-500);
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: all 0.3s ease;
}

.category-btn:hover {
  color: var(--charcoal);
}

.category-btn.active[data-category="kids"] {
  background: var(--coral);
  color: #fff;
}

.category-btn.active[data-category="future"] {
  background: var(--navy);
  color: #fff;
}

/* ===== CALENDAR ===== */
.calendar-container {
  background: #fff;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  overflow: hidden;
  margin-bottom: 1.5rem;
}

.calendar-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--gray-100);
}

.calendar-nav-btn {
  width: 36px;
  height: 36px;
  border: 1px solid var(--gray-200);
  border-radius: 50%;
  background: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  color: var(--charcoal);
  font-size: 0.85rem;
}

.calendar-nav-btn:hover {
  border-color: var(--coral);
  color: var(--coral);
}

.calendar-nav-btn svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.calendar-month-label {
  font-family: 'Oswald', sans-serif;
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--navy);
  letter-spacing: 0.05em;
}

.calendar-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 0.5rem 0.75rem;
  border-bottom: 1px solid var(--gray-100);
}

.calendar-weekday {
  text-align: center;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--gray-500);
  padding: 0.25rem 0;
}

.calendar-weekday:nth-child(6) { color: #2979FF; }
.calendar-weekday:nth-child(7) { color: var(--coral); }

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 0.5rem 0.75rem 0.75rem;
  gap: 2px;
}

.calendar-day {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
  min-height: 44px;
  gap: 2px;
}

.calendar-day:hover:not(.empty):not(.other-month) {
  background: var(--gray-100);
}

.calendar-day.empty {
  cursor: default;
}

.calendar-day.other-month {
  opacity: 0.25;
  cursor: default;
}

.day-number {
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--charcoal);
  line-height: 1;
}

/* Saturday/Sunday colors (grid maintains position via empty cells) */
.calendar-day:nth-child(7n+6) .day-number { color: #2979FF; }
.calendar-day:nth-child(7n) .day-number { color: var(--coral); }

.calendar-day.today {
  background: rgba(255, 107, 53, 0.08);
}

.calendar-day.today .day-number {
  font-weight: 700;
}

.calendar-day.selected {
  background: var(--coral);
}

.calendar-day.selected .day-number {
  color: #fff !important;
}

.category-future .calendar-day.selected {
  background: var(--navy);
}

/* Slot lesson day - solid filled background */
.calendar-day.has-lessons {
  background: var(--coral);
  border: none;
}

.calendar-day.has-lessons .day-number {
  color: #fff !important;
}

.calendar-day.has-lessons .day-dot {
  background: rgba(255,255,255,0.7);
}

.category-future .calendar-day.has-lessons {
  background: var(--navy);
}

.calendar-day.has-lessons.today {
  opacity: 0.9;
}

.calendar-day.has-lessons.selected {
  opacity: 0.85;
}

.day-dot {
  width: 20px;
  height: 3px;
  border-radius: 2px;
  background: var(--coral);
}

.category-future .day-dot {
  background: var(--navy);
}

.calendar-day.selected .day-dot {
  background: rgba(255,255,255,0.7);
}

/* Regular lesson day - border + light background */
.calendar-day.has-regular {
  background: rgba(255, 107, 53, 0.08);
  border: 2px solid var(--coral);
}

.category-future .calendar-day.has-regular {
  background: rgba(13, 27, 42, 0.06);
  border-color: var(--navy);
}

.calendar-day.has-regular.selected {
  border-color: transparent;
}

/* Both slot + regular lessons on same day - double border indicator */
.calendar-day.has-lessons.has-regular {
  background: var(--coral);
  border: none;
  outline: 2px solid var(--coral);
  outline-offset: 2px;
}

.category-future .calendar-day.has-lessons.has-regular {
  background: var(--navy);
  outline-color: var(--navy);
}

/* Regular lesson card */
.slot-card.regular-lesson {
  border-left: 4px solid var(--coral);
  background: rgba(255, 107, 53, 0.06);
}

.category-future .slot-card.regular-lesson {
  border-left-color: var(--navy);
  background: rgba(13, 27, 42, 0.04);
}

.regular-lesson-badge {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: 600;
  color: #fff;
  background: var(--coral);
  padding: 2px 8px;
  border-radius: 10px;
  letter-spacing: 0.03em;
}

.category-future .regular-lesson-badge {
  background: var(--navy);
}

/* ===== DAY LESSONS ===== */
.day-lessons-header {
  font-family: 'Oswald', sans-serif;
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 2px solid var(--gray-100);
  letter-spacing: 0.03em;
}

.day-lessons-empty {
  text-align: center;
  padding: 2rem 1rem;
  color: var(--gray-500);
  font-size: 0.9rem;
  background: #fff;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
}

.day-lessons-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1rem;
}

/* ===== LOADING / ERROR ===== */
.loading-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4rem 2rem;
  gap: 1.2rem;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--gray-200);
  border-top-color: var(--coral);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.loading-text {
  font-size: 0.85rem;
  color: var(--gray-500);
}

.error-container {
  text-align: center;
  padding: 3rem 2rem;
}

.error-icon {
  font-size: 2.5rem;
  margin-bottom: 1rem;
  opacity: 0.3;
}

.error-message {
  font-size: 0.9rem;
  color: var(--gray-500);
  margin-bottom: 1rem;
}

.error-retry {
  padding: 10px 24px;
  border: 2px solid var(--coral);
  border-radius: 30px;
  background: transparent;
  color: var(--coral);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}

.error-retry:hover {
  background: var(--coral);
  color: #fff;
}

/* ===== SETUP INSTRUCTIONS ===== */
.setup-card {
  background: #fff;
  border-radius: var(--radius-lg);
  padding: 2.5rem;
  box-shadow: var(--shadow-md);
  max-width: 700px;
  margin: 0 auto;
}

.setup-card h3 {
  font-family: 'Oswald', sans-serif;
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 0.5rem;
}

.setup-card .setup-subtitle {
  font-size: 0.85rem;
  color: var(--gray-500);
  margin-bottom: 2rem;
}

.setup-steps {
  list-style: none;
  counter-reset: step-counter;
}

.setup-steps li {
  counter-increment: step-counter;
  padding: 1rem 0 1rem 3.2rem;
  border-bottom: 1px solid var(--gray-100);
  position: relative;
  font-size: 0.9rem;
  line-height: 1.6;
}

.setup-steps li:last-child {
  border-bottom: none;
}

.setup-steps li::before {
  content: counter(step-counter);
  position: absolute;
  left: 0;
  top: 1rem;
  width: 28px;
  height: 28px;
  background: var(--coral);
  color: #fff;
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 0.85rem;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.setup-steps code {
  background: var(--gray-100);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.82rem;
  color: var(--coral-dark);
  font-family: 'Consolas', 'Courier New', monospace;
  word-break: break-all;
}

.setup-columns {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-top: 0.5rem;
}

.setup-column-tag {
  background: var(--navy);
  color: #fff;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 500;
}

/* ===== SLOT CARDS ===== */
.slot-card {
  background: #fff;
  border-radius: var(--radius-md);
  padding: 1.2rem 1.5rem;
  box-shadow: var(--shadow-sm);
  border-left: 4px solid var(--coral);
  transition: box-shadow 0.2s ease, transform 0.2s ease;
}

.category-future .slot-card {
  border-left-color: var(--navy);
}

.category-future .slot-book-btn {
  background: var(--navy);
}

.category-future .slot-book-btn:hover {
  background: #1a3a5c;
}

.category-future .slot-tag.time {
  background: rgba(13,27,42,0.08);
  color: var(--navy);
}

.category-future .calendar-nav-btn:hover {
  border-color: var(--navy);
  color: var(--navy);
}

.category-future .calendar-day.today {
  background: rgba(13, 27, 42, 0.06);
}

.slot-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

.slot-card-info {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 0.8rem;

/* ===== BOOKING MODAL ===== */
.booking-modal-overlay {
  position: fixed;

  background: rgba(13,27,42,0.6);

  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
  padding: 1rem;
}

.booking-modal-overlay.active {
  opacity: 1;
  visibility: visible;
}

.booking-modal {
  background: #fff;
  border-radius: var(--radius-lg);
  padding: 2rem;
  max-width: 420px;
  width: 100%;

  flex-wrap: wrap;
  gap: 0.5rem;
}

.booking-field {
  margin-bottom: 1rem;
}

  font-size: 0.82rem;
  font-weight: 500;
  color: var(--charcoal);
  margin-bottom: 0.3rem;
}

.booking-field input {

}

.booking-field input:focus {
  border-color: var(--coral);
}

.booking-modal-actions {
  display: flex;

}

.booking-cancel-btn {
  flex: 1;
  padding: 12px;
  border: 2px solid var(--gray-200);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--gray-500);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
}

.booking-cancel-btn:hover {
  border-color: var(--charcoal);
  color: var(--charcoal);
}

.booking-submit-btn {
  flex: 1.5;
  padding: 12px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--coral);
  color: #fff;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s;
}

.booking-submit-btn:hover { background: var(--coral-light); }
.booking-submit-btn:disabled {

}

.modal-future .booking-field input:focus {

}

.modal-future .booking-submit-btn {
  background: var(--navy);
}

  background: #1a3a5c;
}

.booking-success {
  text-align: center;
  padding: 2rem 1rem;
}

.booking-error-msg {

  border: 1px solid #ffcdd2;
  border-radius: 10px;
  color: #c62828;
  font-size: 0.9rem;
  font-weight: 500;

}

}
.booking-error-msg svg { flex-shrink: 0; stroke: #c62828; }

  color: var(--navy);

}

}

function initTabs() {
  var buttons = document.querySelectorAll('.tab-button');
  var slider = document.getElementById('tab-slider');

  function updateSlider(button) {
    slider.style.width = button.offsetWidth + 'px';
    slider.style.transform = 'translateX(' + (button.offsetLeft - 4) + 'px)';
  }

  var activeBtn = document.querySelector('.tab-button.active');
  if (activeBtn) updateSlider(activeBtn);

  buttons.forEach(function(button) {
    button.addEventListener('click', function() {
      var tabName = this.getAttribute('data-tab');
      buttons.forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      updateSlider(this);
      document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
      document.getElementById('panel-' + tabName).classList.add('active');
    });
  });

  window.addEventListener('resize', function() {
    var active = document.querySelector('.tab-button.active');
    if (active) updateSlider(active);
  });
}

// ===== CALENDAR =====
function isKidsSlot(slot) {
  if (slot.category) return slot.category === 'KIDS';
  var cn = (slot.class_name || '').toLowerCase();
  return cn.indexOf('kids') !== -1 || cn.indexOf('teen') !== -1 || cn.indexOf('レベルアップ') !== -1;
}

function isFutureSlot(slot) {
  if (slot.category) return slot.category === 'FUTURE';
  var cn = (slot.class_name || '').toLowerCase();
  return cn.indexOf('future') !== -1;
}

function getAllDemoSlots() {
  // Merge base + admin-added, then exclude deleted
  var all = demoSlots.concat(demoAdminSlots);
  return all.filter(function(s) {
    return !demoDeletedSlots.some(function(d) {
      return d.date === s.date && d.studio === s.studio && d.time === s.time;
    });
  });
}

function getFilteredSlots() {
  var filterFn = currentCategory === 'kids' ? isKidsSlot : isFutureSlot;

  if (DEMO_MODE) {
    return getAllDemoSlots().filter(filterFn).map(function(s) {
      var extraBooked = demoBookings.filter(function(b) {
        return b.date === s.date && b.studio === s.studio && b.time === s.time;
      }).length;
      return {
        date: s.date, studio: s.studio, time: s.time, class_name: s.class_name,
        max: s.max, booked: (s.booked || 0) + extraBooked,
        available: (s.max === 0 || s.max === '0') ? 999 : Math.max(0, (s.available != null ? s.available : s.max) - (s.booked || 0) - extraBooked),
        category: s.category, members: s.members
      };
    });
  }

  return allSlots.filter(filterFn);
}

function initCalendar() {
  var slotsReady = false;
  var regularsReady = false;

  function tryRender() {
    if (slotsReady && regularsReady) renderCalendar();
  }

  if (!DEMO_MODE && APPS_SCRIPT_URL) {
    fetchSlotsFromAPI(function() { slotsReady = true; tryRender(); });
  } else {
    slotsReady = true;
  }

  fetchRegularLessons(function() { regularsReady = true; tryRender(); });

  if (DEMO_MODE) tryRender();
}

// ===== REGULAR LESSONS =====
var DAY_NAME_MAP = { '日': 0, '月': 1, '火': 2, '水': 3, '木': 4, '金': 5, '土': 6 };

function fetchRegularLessons(callback) {
  if (!APPS_SCRIPT_URL) {
    if (callback) callback();
    return;
  }

  fetch(APPS_SCRIPT_URL + '?action=regularLessons', { redirect: 'follow' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && data.length > 0) {
        regularLessons = [];
        data.forEach(function(item) {
          var dow = DAY_NAME_MAP[item.dayOfWeek];
          if (dow !== undefined && item.class_name) {
            regularLessons.push({
              dayOfWeek: dow,
              studio: item.studio || '',
              time: item.time || '',
              class_name: item.class_name,
              category: (item.category || 'KIDS').toUpperCase()
            });
          }
        });
      }
      if (callback) callback();
    })
    .catch(function() { if (callback) callback(); });
}

function getRegularLessonsForDate(dateStr) {
  var parts = dateStr.split('/');
  var dateObj = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
  var dow = dateObj.getDay();
  var filterFn = currentCategory === 'kids' ? isKidsSlot : isFutureSlot;

  return regularLessons.filter(function(r) {
    return r.dayOfWeek === dow && filterFn(r);
  });
}

function fetchSlotsFromAPI(callback) {
  fetch(APPS_SCRIPT_URL + '?action=slots', { redirect: 'follow' })
    .then(function(r) { return r.json(); })
    .then(function(data) { allSlots = data; if (callback) callback(); })
    .catch(function() { allSlots = []; if (callback) callback(); });
}

function renderCalendar() {
  var year = currentMonth.getFullYear();
  var month = currentMonth.getMonth();

  document.getElementById('calendar-month-label').textContent = year + '年 ' + (month + 1) + '月';

  var grid = document.getElementById('calendar-grid');
  var firstDay = new Date(year, month, 1).getDay();
  var startOffset = (firstDay + 6) % 7; // Monday = 0
  var daysInMonth = new Date(year, month + 1, 0).getDate();

  var today = new Date();
  var todayStr = today.getFullYear() + '/' + String(today.getMonth() + 1).padStart(2, '0') + '/' + String(today.getDate()).padStart(2, '0');

  var filteredSlots = getFilteredSlots();
  var lessonDates = {};
  filteredSlots.forEach(function(s) { lessonDates[s.date] = true; });

  var html = '';

  // Empty cells for offset
  for (var i = 0; i < startOffset; i++) {
    html += '<div class="calendar-day empty"></div>';
  }

  for (var d = 1; d <= daysInMonth; d++) {
    var dateStr = year + '/' + String(month + 1).padStart(2, '0') + '/' + String(d).padStart(2, '0');
    var hasRegular = getRegularLessonsForDate(dateStr).length > 0;
    var isHoliday = isRegularHoliday(dateStr);
    var irregHoliday = isIrregularHoliday(dateStr);
    var classes = ['calendar-day'];
    if (dateStr === todayStr) classes.push('today');
    if (dateStr === selectedDate) classes.push('selected');
    if (isHoliday || irregHoliday) {
      classes.push('holiday-day');
      html += '<div class="' + classes.join(' ') + '" onclick="selectDate(\'' + dateStr + '\')">';
      html += '<span class="day-number">' + d + '</span>';
      html += '<span class="holiday-label">休</span>';
      html += '</div>';
    } else {
      if (lessonDates[dateStr]) classes.push('has-lessons');
      if (hasRegular) classes.push('has-regular');
      html += '<div class="' + classes.join(' ') + '" onclick="selectDate(\'' + dateStr + '\')">';
      html += '<span class="day-number">' + d + '</span>';
      if (lessonDates[dateStr] || hasRegular) html += '<span class="day-dot"></span>';
      html += '</div>';
    }
  }

  grid.innerHTML = html;

  // Re-render lessons if a date is selected
  if (selectedDate) {
    renderDayLessons(selectedDate);
  }
}

function selectDate(dateStr) {
  selectedDate = dateStr;
  renderCalendar();
  renderDayLessons(dateStr);

  // Smooth scroll to lessons on mobile
  var lessonsEl = document.getElementById('day-lessons');
  if (lessonsEl && window.innerWidth <= 768) {
    setTimeout(function() {
      lessonsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }
}

function changeMonth(delta) {
  currentMonth.setMonth(currentMonth.getMonth() + delta);
  selectedDate = null;
  document.getElementById('day-lessons').innerHTML = '';
  renderCalendar();
}

function getSlotMembers(slot) {
  // API mode: members are included in slot data from GAS
  if (!DEMO_MODE) {
    return slot.members || [];
  }

  // Demo mode: generate from demo data
  var members = [];
  var names = ['田中さくら','鈴木はると','佐藤ゆい','山田れん','高橋あおい','伊藤そら','渡辺ひなた','中村みお'];
  var baseSlot = demoSlots.find(function(s) {
    return s.date === slot.date && s.studio === slot.studio && s.time === slot.time;
  });
  if (baseSlot) {
    for (var i = 0; i < baseSlot.booked; i++) {
      members.push({ name: names[i % names.length], booked_at: '03/18 10:' + String(10 + i * 5).padStart(2, '0') });
    }
  }

  demoBookings.filter(function(b) {
    return b.date === slot.date && b.studio === slot.studio && b.time === slot.time;
  }).forEach(function(b) {
    members.push({
      name: b.name,
      booked_at: new Date(b.bookedAt).toLocaleString('ja-JP', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})
    });
  });

  return members;
}

function renderDayLessons(dateStr) {
  var container = document.getElementById('day-lessons');
  var slots = getFilteredSlots().filter(function(s) { return s.date === dateStr; });
  var irregHolidayMatch = isIrregularHoliday(dateStr);
  var regulars = irregHolidayMatch ? [] : getRegularLessonsForDate(dateStr);

  var parts = dateStr.split('/');
  var dateObj = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
  var days = ['日', '月', '火', '水', '木', '金', '土'];
  var dateLabel = parseInt(parts[1]) + '/' + parseInt(parts[2]) + '（' + days[dateObj.getDay()] + '）';

  if (slots.length === 0 && regulars.length === 0) {
    var emptyMsg = 'この日のレッスンはありません';
    if (irregHolidayMatch) {
      emptyMsg = '不定休' + (irregHolidayMatch.reason ? '（' + irregHolidayMatch.reason + '）' : '');
    }
    container.innerHTML =
      '<div class="day-lessons-header">' + escapeHtml(dateLabel) + '</div>' +
      '<div class="day-lessons-empty">' + escapeHtml(emptyMsg) + '</div>';
    return;
  }

  var html = '<div class="day-lessons-header">' + escapeHtml(dateLabel) + ' のレッスン</div>';
  html += '<div class="day-lessons-grid">';

  // Regular lessons first
  regulars.forEach(function(r, idx) {
    var cancelled = isLessonCancelled(dateStr, r.studio, r.time);
    var cancelData = cancelled ? getLessonCancelData(dateStr, r.studio, r.time) : null;
    var cardClass = 'slot-card regular-lesson' + (cancelled ? ' cancelled-lesson' : '');
    html += '<div class="' + cardClass + '" id="regular-card-' + idx + '">';
    html += '<div style="display:flex;justify-content:space-between;align-items:flex-start">';
    html += '<div class="slot-card-info">';
    html += '<span class="regular-lesson-badge">定期レッスン</span>';
    if (r.studio) html += '<span class="slot-tag studio">' + escapeHtml(r.studio) + '</span>';
    html += '<span class="slot-tag time">' + escapeHtml(r.time || '') + '</span>';
    html += '<span class="slot-tag">' + escapeHtml(r.class_name || '') + '</span>';
    html += '</div>';
    if (isAdminMode && !cancelled) {
      html += '<button class="admin-edit-btn" onclick=\'showEditRegularForm(' + JSON.stringify(r).replace(/'/g, "\\'") + ',"regular-card-' + idx + '")\'>' +
        '<svg viewBox="0 0 24 24"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg></button>';
    }
    html += '</div>';
    if (cancelled) {
      html += '<div class="slot-cancel-label" style="margin-top:0.5rem">この日はお休み</div>';
      if (isAdminMode && cancelData) {
        html += '<div style="margin-top:0.5rem"><button class="admin-uncancel-btn" onclick="adminUncancelLesson(' + (cancelData.row || 0) + ')">キャンセル解除</button></div>';
      }
    } else if (isAdminMode) {
      html += '<div style="margin-top:0.5rem"><button class="admin-cancel-lesson-btn" onclick=\'adminCancelLesson(' +
        JSON.stringify({date: dateStr, studio: r.studio, time: r.time, class_name: r.class_name}).replace(/'/g, "\\'") +
        ')\'>&#10005; この日はお休み</button></div>';
    }
    html += '</div>';
  });

  slots.forEach(function(slot, idx) {
    var isUnlimited = slot.max === 0 || slot.max === '0';
    var available = isUnlimited ? 999 : (slot.available || 0);
    var spotClass = isUnlimited ? '' : (available <= 0 ? 'full' : available <= 2 ? 'few' : '');

    var isFull = !isUnlimited && available <= 0;
    html += '<div class="slot-card' + (isFull ? ' slot-full' : '') + '" id="slot-card-' + idx + '">';
    if (isFull) {
      html += '<span class="slot-full-badge">満員</span>';
    }
    html += '<div style="display:flex;justify-content:space-between;align-items:flex-start">';
    html += '<div class="slot-card-info">';
    html += '<span class="slot-tag studio">' + escapeHtml(slot.studio || '') + '</span>';
    html += '<span class="slot-tag time">' + escapeHtml(slot.time || '') + '</span>';
    html += '<span class="slot-tag">' + escapeHtml(slot.class_name || '') + '</span>';
    html += '</div>';
    if (isAdminMode) {
      html += '<button class="admin-edit-btn" onclick=\'showEditSlotForm(' + JSON.stringify(slot).replace(/'/g, "\\'") + ',"slot-card-' + idx + '")\'>' +
        '<svg viewBox="0 0 24 24"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg></button>';
    }
    html += '</div>';
    html += '<div class="slot-availability">';
    if (isUnlimited) {
      html += '<span class="slot-spots" style="color:var(--coral)">予約受付中</span>';
    } else {
      html += '<span class="slot-spots ' + spotClass + '">残り <strong>' + available + '</strong> 枠</span>';
    }

    if (isAdminMode) {
      html += '<button class="admin-delete-btn" onclick=\'adminDeleteSlot(' +
        JSON.stringify({date:slot.date,studio:slot.studio,time:slot.time}).replace(/'/g, "\\'") + ')\'>削除</button>';
    } else if (available > 0) {
      html += '<button class="slot-book-btn" onclick=\'openBookingModal(' +
        JSON.stringify(slot).replace(/'/g, "\\'") + ')\'>予約する</button>';
    } else {
      html += '<button class="slot-book-btn" disabled>満員</button>';
    }

    html += '</div>';

    // Show booked members
    var members = getSlotMembers(slot);
    if (members.length > 0) {
      html += '<div style="margin-top:0.8rem;padding-top:0.8rem;border-top:1px solid var(--gray-100)">';
      var capLabel = isUnlimited ? '無制限' : ((slot.max || 10) + '名');
      html += '<div style="font-size:0.8rem;font-weight:500;color:var(--gray-500);margin-bottom:0.4rem;">予約者 (' + members.length + '/' + capLabel + ')</div>';
      members.forEach(function(m) {
        html += '<div class="bklist-member">';
        html += '<div class="bklist-member-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>';
        html += '<span class="bklist-member-name">' + escapeHtml(m.name) + '</span>';
        if (m.booked_at) html += '<span class="bklist-member-time">' + escapeHtml(m.booked_at) + '</span>';
        if (isAdminMode) {
          html += '<button class="admin-cancel-btn" title="予約キャンセル" onclick=\'adminCancelBooking(' +
            JSON.stringify({date:slot.date,studio:slot.studio,time:slot.time,name:m.name}).replace(/'/g, "\\'") +
            ')\'>&times;</button>';
        }
        html += '</div>';
      });
      html += '</div>';
    }

    html += '</div>';
  });

  html += '</div>';
  container.innerHTML = html;
}

  if (currentCategory === 'future') modal.classList.add('modal-future');
  modal.classList.add('active');

  // Restore saved name/email from localStorage
  try {
    var savedName = localStorage.getItem('btm_booking_name');
    var savedEmail = localStorage.getItem('btm_booking_email');
    if (savedName) document.getElementById('booking-name').value = savedName;
    if (savedEmail) document.getElementById('booking-email').value = savedEmail;
  } catch(e) {}
}

function closeBookingModal() {
  document.getElementById('booking-modal').classList.remove('active');
  currentBookingSlot = null;
}

function submitBooking() {
  if (!currentBookingSlot) return;

  var name = document.getElementById('booking-name').value.trim();
  var emailEl = document.getElementById('booking-email');
  var email = emailEl ? emailEl.value.trim() : '';

  if (!name) {
    document.getElementById('booking-name').focus();
    return;
  }

  // Save name/email to localStorage for next time
  try { localStorage.setItem('btm_booking_name', name); } catch(e) {}
  if (email) { try { localStorage.setItem('btm_booking_email', email); } catch(e) {} }

  var btn = document.getElementById('booking-submit-btn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  if (DEMO_MODE) {
    setTimeout(function() {
      var isDuplicate = demoBookings.some(function(b) {
        return b.date === currentBookingSlot.date && b.studio === currentBookingSlot.studio &&
               b.time === currentBookingSlot.time && b.class_name === currentBookingSlot.class_name && b.name === name;
      });
      if (isDuplicate) {
        btn.disabled = false; btn.textContent = '予約する';
        showBookingError(name + 'さんは既にこのレッスンを予約済みです');
        return;
      }
      demoBookings.push({
        date: currentBookingSlot.date,
        studio: currentBookingSlot.studio,
        time: currentBookingSlot.time,
        class_name: currentBookingSlot.class_name,
        name: name,
        bookedAt: new Date().toISOString()
      });
      sessionStorage.setItem('btm_demo_bookings', JSON.stringify(demoBookings));
      showBookingSuccess(name);
    }, 800);
    return;
  }

  var params = new URLSearchParams({
    action: 'book',
    date: currentBookingSlot.date || '',
    studio: currentBookingSlot.studio || '',
    time: currentBookingSlot.time || '',
    class_name: currentBookingSlot.class_name || '',
    name: name, email: email
  });

  fetch(APPS_SCRIPT_URL + '?' + params.toString(), { redirect: 'follow' })
    .then(function(r) { return r.json(); })
    .then(function(result) {
      if (result.success) { showBookingSuccess(name); }
      else { btn.disabled = false; btn.textContent = '予約する'; showBookingError(result.error || '予約に失敗しました'); }
    })
    .catch(function() { btn.disabled = false; btn.textContent = '予約する'; showBookingError('通信エラーが発生しました'); });
}

function showBookingError(message) {
  var existing = document.querySelector('.booking-error-msg');
  if (existing) existing.remove();
  var form = document.getElementById('booking-form');
  var errDiv = document.createElement('div');
  errDiv.className = 'booking-error-msg';
  errDiv.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg> ' + escapeHtml(message);
  form.insertBefore(errDiv, form.querySelector('.booking-modal-actions'));
  setTimeout(function() { errDiv.classList.add('show'); }, 10);
}

function showBookingSuccess(name) {
  var body = document.getElementById('booking-modal-body');
  body.innerHTML =

// ===== ANNOUNCEMENTS =====
var cachedAnnouncements = null;

function renderAnnouncements() {
  var container = document.getElementById('announcements-content');
  if (!cachedAnnouncements || cachedAnnouncements.length === 0) { showAnnounceEmpty(container); return; }
  var catUpper = currentCategory.toUpperCase();
  var filtered = cachedAnnouncements.filter(function(a) {
    var ac = (a.category || '').toUpperCase();
    return ac === catUpper || ac === '全体' || ac === '';
  });
  if (filtered.length === 0) { showAnnounceEmpty(container); return; }
  var pinned = filtered.filter(function(a) { return a.pinned; });
  var unpinned = filtered.filter(function(a) { return !a.pinned; });
  var sorted = pinned.reverse().concat(unpinned.reverse());
  var html = '';
  for (var i = 0; i < sorted.length; i++) {
    var a = sorted[i];
    var isImportant = (a.importance || '').indexOf('重要') !== -1;
    var isPinned = a.pinned;
    var cardClass = 'announce-card';
    if (isPinned) cardClass += ' pinned';
    if (isImportant) cardClass += ' important';
    html += '<div class="' + cardClass + '">';
    html += '<div class="announce-card-header">';
    if (isPinned) html += '<span class="announce-pin-icon">&#128204;</span>';
    html += '<span class="announce-date">' + escapeHtml(a.date || '') + '</span>';
    var cat = (a.category || '');
    if (cat === 'KIDS') html += '<span class="announce-badge-kids">KIDS</span>';
    if (cat === 'FUTURE') html += '<span class="announce-badge-future">FUTURE</span>';
    if (cat === '全体') html += '<span class="announce-badge-all">全体</span>';
    if (isImportant) html += '<span class="announce-badge-important">重要</span>';
    html += '</div>';
    html += '<h4>' + escapeHtml(a.title || '') + '</h4>';
    html += '<p>' + escapeHtml(a.content || '') + '</p>';
    if (a.images && a.images.length > 0) {
      html += '<div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.8rem">';
      for (var j = 0; j < a.images.length; j++) {
        html += '<a href="' + a.images[j] + '" target="_blank" style="display:block"><img src="' + a.images[j] + '" style="width:120px;height:120px;object-fit:cover;border-radius:8px;border:1px solid #e0d8cc" loading="lazy"></a>';
      }
      html += '</div>';
    }
    html += '</div>';
  }
  container.innerHTML = html;
}

function fetchAnnouncements() {
  var container = document.getElementById('announcements-content');

  if (DEMO_MODE) {
    cachedAnnouncements = demoAnnouncements;
    renderAnnouncements();
    return;
  }

  if (!APPS_SCRIPT_URL) {
    showAnnounceEmpty(container);
    return;
  }

  container.innerHTML = '<div class="loading-container"><div class="spinner"></div><span class="loading-text">お知らせを読み込み中...</span></div>';

  fetch(APPS_SCRIPT_URL + '?action=announcements', { redirect: 'follow' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      cachedAnnouncements = data || [];
      renderAnnouncements();
    })
    .catch(function() { showAnnounceEmpty(container); });
}

function showAnnounceEmpty(container) {
  container.innerHTML =
    '<div class="announcement-empty"><div class="announcement-empty-icon">' +
    '<svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>' +

function toggleUnlimited(mode) {

  var cb = document.getElementById(cbId);

  if (cb && num) {
    num.disabled = cb.checked;
    if (cb.checked) num.style.opacity = '0.4';
    else num.style.opacity = '1';
  }
}

function switchSlotMode(mode) {
  adminSlotMode = mode;
  var singleForm = document.getElementById('admin-single-form');
  var bulkForm = document.getElementById('admin-bulk-form');
  if (singleForm) singleForm.style.display = mode === 'single' ? 'block' : 'none';
  if (bulkForm) bulkForm.style.display = mode === 'bulk' ? 'block' : 'none';

  var toggleBtns = document.querySelectorAll('.admin-mode-toggle button');

function toggleDow(btn) {
  btn.classList.toggle('selected');

}

function getSelectedDows() {
  var btns = document.querySelectorAll('.admin-dow-btn.selected');
  var dows = [];
  btns.forEach(function(b) { dows.push(parseInt(b.getAttribute('data-dow'))); });
  return dows; // 0=月, 1=火, ..., 6=日
}

function getBulkDates() {
  var startEl = document.getElementById('admin-bulk-start');
  var endEl = document.getElementById('admin-bulk-end');
  if (!startEl || !endEl) return [];

  var start = new Date(startEl.value);
  var end = new Date(endEl.value);
  if (isNaN(start.getTime()) || isNaN(end.getTime()) || start > end) return [];

  var dows = getSelectedDows();
  if (dows.length === 0) return [];

  // Convert our dow (0=月..6=日) to JS dow (0=日,1=月..6=土)
  var jsDowMap = [1, 2, 3, 4, 5, 6, 0]; // 月=1, 火=2, ..., 日=0
  var targetJsDows = dows.map(function(d) { return jsDowMap[d]; });

  var dates = [];
  var cur = new Date(start);
  while (cur <= end) {
    if (targetJsDows.indexOf(cur.getDay()) !== -1) {
      dates.push(new Date(cur));
    }
    cur.setDate(cur.getDate() + 1);
  }
  return dates;
}

function updateBulkPreview() {
  var previewEl = document.getElementById('admin-bulk-preview');
  if (!previewEl) return;

  var dates = getBulkDates();
  if (dates.length === 0) {
    previewEl.innerHTML = '曜日を選んで日程を確認';
    return;
  }

  var dowNames = ['日','月','火','水','木','金','土'];
  var list = dates.map(function(d) {
    return (d.getMonth()+1) + '/' + d.getDate() + '(' + dowNames[d.getDay()] + ')';
  }).join('、');

  previewEl.innerHTML = '<strong>' + dates.length + '件</strong>追加されます：' + list;
}

function adminAddSlot() {
  var date = document.getElementById('admin-slot-date').value;
  var studio = document.getElementById('admin-slot-studio').value;
  var tStart = document.getElementById('admin-slot-time-start').value;
  var tEnd = document.getElementById('admin-slot-time-end').value;
  var time = tStart && tEnd ? tStart + '〜' + tEnd : '';
  var className = document.getElementById('admin-slot-class').value.trim();
  var unlimited = document.getElementById('admin-slot-unlimited').checked;
  var max = unlimited ? 0 : (parseInt(document.getElementById('admin-slot-max').value) || 8);
  var category = currentCategory.toUpperCase();

  if (!date || !studio || !tStart || !tEnd || !className) {
    alert('すべての項目を入力してください');
    return;
  }

  var dateStr = date.replace(/-/g, '/');
  var avail = unlimited ? 999 : max;

  if (DEMO_MODE) {
    demoAdminSlots.push({ date: dateStr, studio: studio, time: time, class_name: className, max: max, booked: 0, available: avail, category: category });
    sessionStorage.setItem('btm_demo_admin_slots', JSON.stringify(demoAdminSlots));
    alert('追加しました');
    renderCalendar();
    return;
  }

  var params = new URLSearchParams({
    action: 'addSlot', adminKey: ADMIN_PASSWORD,
    date: dateStr, studio: studio, time: time, class_name: className, max: max, category: category
  });
  apiCall(params, function() { alert('追加しました'); fetchSlotsFromAPI(function() { renderCalendar(); }); });
}

function adminBulkAddSlots() {
  var dates = getBulkDates();
  if (dates.length === 0) {
    alert('曜日と期間を設定してください');
    return;
  }

  var studio = document.getElementById('admin-bulk-studio').value;
  var tStart = document.getElementById('admin-bulk-time-start').value;
  var tEnd = document.getElementById('admin-bulk-time-end').value;
  var time = tStart && tEnd ? tStart + '〜' + tEnd : '';
  var className = document.getElementById('admin-bulk-class').value.trim();
  var unlimited = document.getElementById('admin-bulk-unlimited').checked;
  var max = unlimited ? 0 : (parseInt(document.getElementById('admin-bulk-max').value) || 8);
  var category = currentCategory.toUpperCase();

  if (!studio || !tStart || !tEnd || !className) {

    return;
  }

  if (!confirm(dates.length + '件のレッスン枠を追加しますか？')) return;

  if (DEMO_MODE) {
    dates.forEach(function(d) {
      var dateStr = d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
      demoAdminSlots.push({ date: dateStr, studio: studio, time: time, class_name: className, max: max, booked: 0, available: avail, category: category });
    });

    alert(dates.length + '件追加しました');
    renderCalendar();
    return;
  }

  // Real mode: sequential API calls
  var i = 0;
  function addNext() {
    if (i >= dates.length) {
      alert(dates.length + '件追加しました');
      fetchSlotsFromAPI(function() { renderCalendar(); });
      return;
    }
    var d = dates[i];
    var dateStr = d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
    var params = new URLSearchParams({
      action: 'addSlot', adminKey: ADMIN_PASSWORD,
      date: dateStr, studio: studio, time: time, class_name: className, max: max, category: category
    });
    i++;
    apiCall(params, addNext);
  }
  addNext();

  var preview = document.getElementById('admin-announce-preview');

  var files = Array.from(input.files).slice(0, 5);
  if (input.files.length > 5) alert('最大5枚まで。最初の5枚を使用します。');
  files.forEach(function(file, i) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var div = document.createElement('div');
      div.style.cssText = 'position:relative;width:80px;height:80px;flex-shrink:0';

      preview.appendChild(div);

  });
}

function removeImagePreview(btn, index) {
  _removedImageIndexes.push(index);
  btn.parentElement.style.display = 'none';
}

function compressImage(file) {
  return new Promise(function(resolve) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement('canvas');
        var maxW = 1200;
        var w = img.width, h = img.height;
        if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
        canvas.width = w;
        canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        var logo = new Image();
        logo.crossOrigin = 'anonymous';
        logo.onload = function() {
          var logoSize = Math.max(48, Math.round(w * 0.08));
          var margin = 12;
          ctx.globalAlpha = 0.3;
          ctx.drawImage(logo, w - logoSize - margin, h - logoSize - margin, logoSize, logoSize);
          ctx.globalAlpha = 1.0;
          resolve(canvas.toDataURL('image/jpeg', 0.7));
        };
        logo.onerror = function() {
          resolve(canvas.toDataURL('image/jpeg', 0.7));
        };
        logo.src = 'images/btm_logo.webp';
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function adminAddAnnouncement() {
  var dateInput = document.getElementById('admin-announce-date').value;
  var title = document.getElementById('admin-announce-title').value.trim();
  var content = document.getElementById('admin-announce-content').value.trim();
  var importance = document.getElementById('admin-announce-importance').value;

  if (!title) { alert('タイトルを入力してください'); return; }

  var dateStr = dateInput ? dateInput.replace(/-/g, '/') : '';

  if (DEMO_MODE) {
    demoAnnouncements.push({ date: dateStr, title: title, content: content, importance: importance, category: _announceCategory, images: [] });
    clearAnnounceForm();
    fetchAdminAnnouncements();
    alert('追加しました');
    return;
  }

  var attachChecked = document.getElementById('admin-announce-attach').checked;
  var fileInput = document.getElementById('admin-announce-images');
  var hasImages = attachChecked && fileInput && fileInput.files.length > 0;

  if (hasImages) {
    var btn = document.getElementById('admin-announce-submit');
    btn.disabled = true;
    btn.textContent = '画像をアップロード中...';

    var files = Array.from(fileInput.files).slice(0, 5).filter(function(_, i) {
      return _removedImageIndexes.indexOf(i) === -1;
    });

    Promise.all(files.map(compressImage)).then(function(base64Images) {
      var body = {
        action: 'addAnnouncement',
        adminKey: ADMIN_PASSWORD,
        date: dateStr, title: title, content: content, importance: importance,
        category: _announceCategory,
        images: base64Images
      };

      fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(body), redirect: 'follow' })
        .then(function(r) { return r.json(); })
        .then(function(result) {
          btn.disabled = false;
          btn.textContent = '追加する';
          if (result.success) {
            clearAnnounceForm();
            alert('追加しました');
            fetchAdminAnnouncements();
          } else {
            alert(result.error || 'エラーが発生しました');
          }
        })
        .catch(function(e) {
          btn.disabled = false;
          btn.textContent = '追加する';
          alert('通信エラー: ' + e.message);
        });
    });
  } else {
    var params = new URLSearchParams({
      action: 'addAnnouncement', adminKey: ADMIN_PASSWORD,
      date: dateStr, title: title, content: content, importance: importance, category: _announceCategory
    });
    apiCall(params, function() {
      clearAnnounceForm();
      alert('追加しました');
      fetchAdminAnnouncements();
    });
  }
}

function generateTimeOpts(selected) {

  for (var h = 9; h <= 22; h++) {

      var tv = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
      html += '<option value="' + tv + '"' + (tv === selected ? ' selected' : '') + '>' + tv + '</option>';
    }
  }
  return html;
}

function buildStudioOpts(cat, selected) {
  var list = (window._studioMap && window._studioMap[cat]) || [];
  return list.map(function(s) {

  }).join('');

function isRegularHoliday(dateStr) {
  var parts = dateStr.split('/');
  var dateObj = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
  var dow = dateObj.getDay();
  var dowNames = ['日','月','火','水','木','金','土'];
  var dayName = dowNames[dow];
  var catUpper = currentCategory.toUpperCase();
  var kidsStudios = ['若葉studio', '稲毛studio'];
  var futureStudios = ['千葉studio', '美浜studio', '稲毛studio(穴川)', '若葉studio'];
  var studioList = catUpper === 'FUTURE' ? futureStudios : kidsStudios;

  return regularHolidays.some(function(h) {
    if (h.dayOfWeek !== dayName) return false;
    // If studio is specified, check if it matches the current category's studios
    if (h.studio) {
      return studioList.indexOf(h.studio) !== -1;
    }
    return true; // No studio = applies to all
  });
}

    dayOfWeek: dow,
    studio: studio || ''
  };

  fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(body), redirect: 'follow' })
    .then(function(r) { return r.json(); })
    .then(function(result) {
      if (result.success) {
        alert('定期休みを追加しました');
        fetchRegularHolidays();
      } else {
        alert(result.error || 'エラーが発生しました');
      }
    })
    .catch(function(e) { alert('通信エラー: ' + e.message); });
}

function adminDeleteRegularHoliday(id) {
  if (!confirm('この定期休みを削除しますか？')) return;

  var body = {
    action: 'adminDeleteRegularHoliday',
    adminKey: ADMIN_PASSWORD,
    id: id
  };

  fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(body), redirect: 'follow' })
    .then(function(r) { return r.json(); })
    .then(function(result) {
      if (result.success) {
        fetchRegularHolidays();
      } else {
        alert(result.error || 'エラーが発生しました');
      }
    })
    .catch(function(e) { alert('通信エラー: ' + e.message); });
}

function renderAdminHolidayList() {
  var container = document.getElementById('admin-holiday-list');
  if (!container) return;
  if (!regularHolidays || regularHolidays.length === 0) {
    container.innerHTML = '<div class="day-lessons-empty" style="padding:1rem;font-size:0.85rem">定期休みはまだ設定されていません</div>';
    return;
  }
  var html = '';
  regularHolidays.forEach(function(h) {
    html += '<div class="holiday-list-item">';
    html += '<div class="holiday-info">';
    html += '<strong>' + escapeHtml(h.dayOfWeek || '') + '曜</strong>';
    if (h.studio) html += '<span style="margin-left:0.5rem;font-size:0.82rem;color:var(--gray-500)">' + escapeHtml(h.studio) + '</span>';
    else html += '<span style="margin-left:0.5rem;font-size:0.82rem;color:var(--gray-500)">全スタジオ</span>';
    html += '</div>';
    html += '<button class="admin-cancel-btn" title="削除" onclick="adminDeleteRegularHoliday(' + (h.id || h.row || 0) + ')">&times;</button>';
    html += '</div>';
  });
  container.innerHTML = html;
}

// ===== LESSON CANCELS (日別キャンセル) =====
function fetchLessonCancels(callback) {
  if (!APPS_SCRIPT_URL) {
    if (callback) callback();
    return;
  }
  fetch(APPS_SCRIPT_URL + '?action=lessoncancels', { redirect: 'follow' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && Array.isArray(data)) {
        lessonCancels = data;
      }
      if (callback) callback();
      renderCalendar();
      if (selectedDate) renderDayLessons(selectedDate);
    })
    .catch(function() {
      lessonCancels = [];
      if (callback) callback();
    });
}

function isLessonCancelled(dateStr, studio, time) {
  return lessonCancels.some(function(c) {
    return c.date === dateStr && c.studio === studio && c.time === time;
  });
}

function getLessonCancelData(dateStr, studio, time) {
  return lessonCancels.find(function(c) {
    return c.date === dateStr && c.studio === studio && c.time === time;
  }) || null;
}

        fetchLessonCancels();

      }

}

function adminUncancelLesson(row) {

// ===== IRREGULAR HOLIDAYS (不定休) =====
function fetchIrregularHolidays(callback) {
  if (!APPS_SCRIPT_URL) {
    if (callback) callback();
    return;
  }
  fetch(APPS_SCRIPT_URL + '?action=irregularholidays', { redirect: 'follow' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && Array.isArray(data)) {
        irregularHolidays = data;
      }
      if (callback) callback();
      renderCalendar();
      if (selectedDate) renderDayLessons(selectedDate);
      if (isAdminMode) renderAdminIrregularHolidayList();
    })
    .catch(function() {
      irregularHolidays = [];
      if (callback) callback();
    });
}

function isIrregularHoliday(dateStr) {
  return irregularHolidays.find(function(h) {
    var cat = (h.category || '').toUpperCase();
    var cur = currentCategory.toUpperCase();
    return h.date === dateStr && (cat === cur || cat === '全体' || cat === '');
  });
}

function adminAddIrregularHoliday() {
  var dateInput = document.getElementById('admin-irreg-holiday-date');
  var reasonInput = document.getElementById('admin-irreg-holiday-reason');

  if (!dateInput || !dateInput.value) { alert('日付を選択してください'); return; }

  var dateParts = dateInput.value.split('-');
  var dateStr = dateParts[0] + '/' + dateParts[1] + '/' + dateParts[2];

  var body = {
    action: 'addIrregularHoliday',
    adminKey: ADMIN_PASSWORD,
    date: dateStr,
    reason: reasonInput ? reasonInput.value : '',
    category: currentCategory.toUpperCase()
  };

  fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(body), redirect: 'follow' })
    .then(function(r) { return r.json(); })
    .then(function(result) {
      if (result.success) {
        alert('不定休を追加しました');
        if (dateInput) dateInput.value = '';
        if (reasonInput) reasonInput.value = '';
        fetchIrregularHolidays();
      } else {
        alert(result.error || 'エラーが発生しました');
      }
    })
    .catch(function(e) { alert('通信エラー: ' + e.message); });
}

function adminDeleteIrregularHoliday(row) {
  if (!confirm('この不定休を削除しますか？')) return;

  var body = {
    action: 'deleteIrregularHoliday',
    adminKey: ADMIN_PASSWORD,
    row: row
  };

  fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(body), redirect: 'follow' })
    .then(function(r) { return r.json(); })
    .then(function(result) {
      if (result.success) {
        fetchIrregularHolidays();
      } else {
        alert(result.error || 'エラーが発生しました');
      }
    })
    .catch(function(e) { alert('通信エラー: ' + e.message); });
}

function renderAdminIrregularHolidayList() {
  var container = document.getElementById('admin-irreg-holiday-list');
  if (!container) return;

  var catUpper = currentCategory.toUpperCase();
  var filtered = irregularHolidays.filter(function(h) {
    var cat = (h.category || '').toUpperCase();
    return cat === catUpper || cat === '全体' || cat === '';
  });

  if (filtered.length === 0) {
    container.innerHTML = '<div class="day-lessons-empty" style="padding:1rem;font-size:0.85rem">不定休はまだ設定されていません</div>';
    return;
  }
  var html = '';
  filtered.forEach(function(h) {
    html += '<div class="holiday-list-item">';
    html += '<div class="holiday-info">';
    html += '<strong>' + escapeHtml(h.date || '') + '</strong>';
    if (h.reason) html += '<span style="margin-left:0.5rem;font-size:0.82rem;color:var(--gray-500)">' + escapeHtml(h.reason) + '</span>';
    html += '</div>';
    html += '<button class="admin-cancel-btn" title="削除" onclick="adminDeleteIrregularHoliday(' + (h.row || 0) + ')">&times;</button>';
    html += '</div>';
  });
  container.innerHTML = html;
}

        alert(result.error || 'エラーが発生しました');
      }
    })
    .catch(function(e) { alert('通信エラー: ' + e.message); });
}

function apiCall(params, onSuccess) {
  // Convert URLSearchParams to plain object for JSON body
  var body = {};
  params.forEach(function(value, key) { body[key] = value; });

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(body),
    redirect: 'follow'
  })
    .then(function(r) { return r.json(); })
    .then(function(result) {
      if (result.success) { if (onSuccess) onSuccess(result); }
      else { alert(result.error || 'エラーが発生しました'); }
    })
    .catch(function(e) { alert('通信エラー: ' + e.message); });
}

// ===== UTILITIES =====
function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}
