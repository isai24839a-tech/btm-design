<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEAT THE MIX | Members Only</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --cream: #FBF7F0;
  --charcoal: #1a1a1a;
  --coral: #FF6B35;
  --navy: #0D1B2A;
  --coral-light: #ff8c5e;
  --coral-dark: #e55a28;
  --navy-light: #1B2D45;
  --gray-100: #f5f0e8;
  --gray-200: #e8e0d4;
  --gray-300: #d0c8bc;
  --gray-500: #8a8278;
  --shadow-sm: 0 1px 3px rgba(13, 27, 42, 0.08);
  --shadow-md: 0 4px 12px rgba(13, 27, 42, 0.1);
  --shadow-lg: 0 8px 30px rgba(13, 27, 42, 0.12);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  background-color: var(--cream);
  color: var(--charcoal);
  line-height: 1.7;
  min-height: 100vh;
}

/* ===== PASSWORD GATE ===== */
#password-gate {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--navy);
  transition: opacity 0.5s ease, visibility 0.5s ease;
}

#password-gate.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.gate-container {
  text-align: center;
  padding: 2rem;
  max-width: 400px;
  width: 100%;
}

.gate-logo {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 0.3em;
  color: var(--coral);
  margin-bottom: 2.5rem;
  text-transform: uppercase;
}

.gate-title {
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 2.5rem;
  letter-spacing: 0.15em;
  color: #fff;
  margin-bottom: 0.5rem;
}

.gate-subtitle {
  font-size: 0.9rem;
  color: rgba(255, 255, 255, 0.5);
  letter-spacing: 0.1em;
  margin-bottom: 3rem;
  font-weight: 300;
}

.gate-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  align-items: center;
}

.gate-input-wrapper {
  position: relative;
  width: 100%;
  max-width: 300px;
}

.gate-input {
  width: 100%;
  padding: 14px 50px 14px 20px;
  border: 2px solid rgba(255, 255, 255, 0.15);
  border-radius: 50px;
  background: rgba(255, 255, 255, 0.05);
  color: #fff;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.15em;
  outline: none;
  transition: border-color 0.3s ease, background 0.3s ease;
}

.gate-input::placeholder {
  color: rgba(255, 255, 255, 0.3);
  letter-spacing: 0.05em;
}

.gate-input:focus {
  border-color: var(--coral);
  background: rgba(255, 255, 255, 0.08);
}

.gate-submit {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  width: 40px;
  height: 40px;
  border: none;
  border-radius: 50%;
  background: var(--coral);
  color: #fff;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s ease, transform 0.2s ease;
}

.gate-submit:hover {
  background: var(--coral-light);
}

.gate-submit:active {
  transform: translateY(-50%) scale(0.95);
}

.gate-submit svg {
  width: 18px;
  height: 18px;
  fill: none;
  stroke: #fff;
  stroke-width: 2.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.gate-error {
  color: var(--coral);
  font-size: 0.85rem;
  height: 1.5em;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.gate-error.visible {
  opacity: 1;
}

.gate-input-wrapper.shake {
  animation: shake 0.5s ease-in-out;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  15% { transform: translateX(-8px); }
  30% { transform: translateX(8px); }
  45% { transform: translateX(-6px); }
  60% { transform: translateX(6px); }
  75% { transform: translateX(-3px); }
  90% { transform: translateX(3px); }
}

.gate-decoration {
  position: absolute;
  border-radius: 50%;
  opacity: 0.03;
  background: var(--coral);
}

.gate-decoration-1 {
  width: 400px;
  height: 400px;
  top: -100px;
  right: -100px;
}

.gate-decoration-2 {
  width: 300px;
  height: 300px;
  bottom: -80px;
  left: -80px;
}

/* ===== MAIN CONTENT ===== */
#main-content {
  display: none;
  opacity: 0;
  transition: opacity 0.5s ease;
}

#main-content.visible {
  display: block;
  opacity: 1;
}

/* ===== NAVBAR ===== */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(251, 247, 240, 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--gray-200);
  padding: 0 1.5rem;
}

.navbar-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
}

.navbar-back {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  text-decoration: none;
  color: var(--gray-500);
  font-size: 0.85rem;
  font-weight: 500;
  transition: color 0.2s ease;
}

.navbar-back:hover {
  color: var(--coral);
}

.navbar-back svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.navbar-brand {
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 0.85rem;
  letter-spacing: 0.2em;
  color: var(--navy);
  text-transform: uppercase;
}

.navbar-member-badge {
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  color: var(--coral);
  background: rgba(255, 107, 53, 0.08);
  padding: 4px 10px;
  border-radius: 20px;
  text-transform: uppercase;
}

/* ===== TABS ===== */
.tabs-container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 1.5rem 1.5rem 0;
}

.tabs {
  display: flex;
  gap: 0;
  background: var(--gray-100);
  border-radius: var(--radius-md);
  padding: 4px;
  position: relative;
}

.tab-button {
  flex: 1;
  padding: 12px 1.5rem;
  border: none;
  background: transparent;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--gray-500);
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: color 0.3s ease;
  position: relative;
  z-index: 1;
  white-space: nowrap;
}

.tab-button:hover {
  color: var(--charcoal);
}

.tab-button.active {
  color: var(--charcoal);
}

.tab-slider {
  position: absolute;
  top: 4px;
  left: 4px;
  height: calc(100% - 8px);
  background: #fff;
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-sm);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 0;
}

/* ===== TAB PANELS ===== */
.tab-panels {
  max-width: 1100px;
  margin: 0 auto;
  padding: 1.5rem;
}

.tab-panel {
  display: none;
  animation: fadeIn 0.4s ease;
}

.tab-panel.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== SCHEDULE TAB ===== */
.schedule-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
  gap: 0.75rem;
}

.schedule-title {
  font-family: 'Oswald', sans-serif;
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--navy);
  letter-spacing: 0.05em;
}

.schedule-meta {
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
}

.last-updated {
  font-size: 0.75rem;
  color: var(--gray-500);
}

.refresh-button {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 6px 14px;
  border: 1px solid var(--gray-200);
  border-radius: 20px;
  background: #fff;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.78rem;
  color: var(--gray-500);
  cursor: pointer;
  transition: all 0.2s ease;
}

.refresh-button:hover {
  border-color: var(--coral);
  color: var(--coral);
}

.refresh-button svg {
  width: 14px;
  height: 14px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: transform 0.3s ease;
}

.refresh-button:hover svg {
  transform: rotate(180deg);
}

.refresh-button.spinning svg {
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* Loading Spinner */
.loading-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4rem 2rem;
  gap: 1.2rem;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--gray-200);
  border-top-color: var(--coral);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

.loading-text {
  font-size: 0.85rem;
  color: var(--gray-500);
}

/* Setup Instructions */
.setup-card {
  background: #fff;
  border-radius: var(--radius-lg);
  padding: 2.5rem;
  box-shadow: var(--shadow-md);
  max-width: 700px;
  margin: 0 auto;
}

.setup-card h3 {
  font-family: 'Oswald', sans-serif;
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 0.5rem;
}

.setup-card .setup-subtitle {
  font-size: 0.85rem;
  color: var(--gray-500);
  margin-bottom: 2rem;
}

.setup-steps {
  list-style: none;
  counter-reset: step-counter;
}

.setup-steps li {
  counter-increment: step-counter;
  padding: 1rem 0 1rem 3.2rem;
  border-bottom: 1px solid var(--gray-100);
  position: relative;
  font-size: 0.9rem;
  line-height: 1.6;
}

.setup-steps li:last-child {
  border-bottom: none;
}

.setup-steps li::before {
  content: counter(step-counter);
  position: absolute;
  left: 0;
  top: 1rem;
  width: 28px;
  height: 28px;
  background: var(--coral);
  color: #fff;
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 0.85rem;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.setup-steps code {
  background: var(--gray-100);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.82rem;
  color: var(--coral-dark);
  font-family: 'Consolas', 'Courier New', monospace;
  word-break: break-all;
}

.setup-columns {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-top: 0.5rem;
}

.setup-column-tag {
  background: var(--navy);
  color: #fff;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 500;
}

/* Schedule Table */
.schedule-table-wrapper {
  overflow-x: auto;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-md);
  background: #fff;
  -webkit-overflow-scrolling: touch;
}

.schedule-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9rem;
}

.schedule-table thead {
  background: var(--navy);
  color: #fff;
}

.schedule-table th {
  padding: 14px 16px;
  font-family: 'Oswald', sans-serif;
  font-weight: 500;
  font-size: 0.82rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-align: left;
  white-space: nowrap;
}

.schedule-table td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--gray-100);
  vertical-align: middle;
}

.schedule-table tbody tr:last-child td {
  border-bottom: none;
}

.schedule-table tbody tr {
  transition: background 0.2s ease;
}

.schedule-table tbody tr:hover {
  background: var(--gray-100);
}

.status-badge {
  display: inline-block;
  padding: 3px 12px;
  border-radius: 20px;
  font-size: 0.78rem;
  font-weight: 500;
  white-space: nowrap;
}

.status-open {
  background: #e8f5e9;
  color: #2e7d32;
}

.status-closed {
  background: #fce4ec;
  color: #c62828;
}

.status-few {
  background: #fff3e0;
  color: #e65100;
}

.status-default {
  background: var(--gray-100);
  color: var(--gray-500);
}

/* Schedule Cards (mobile) */
.schedule-cards {
  display: none;
}

.schedule-card-item {
  background: #fff;
  border-radius: var(--radius-md);
  padding: 1.2rem;
  margin-bottom: 0.75rem;
  box-shadow: var(--shadow-sm);
  border-left: 4px solid var(--coral);
}

.schedule-card-date {
  font-family: 'Oswald', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 0.6rem;
}

.schedule-card-detail {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.85rem;
  padding: 0.25rem 0;
  color: var(--charcoal);
}

.schedule-card-label {
  color: var(--gray-500);
  font-size: 0.78rem;
  min-width: 60px;
}

/* Error message */
.error-container {
  text-align: center;
  padding: 3rem 2rem;
}

.error-icon {
  font-size: 2.5rem;
  margin-bottom: 1rem;
  opacity: 0.3;
}

.error-message {
  font-size: 0.9rem;
  color: var(--gray-500);
  margin-bottom: 1rem;
}

.error-retry {
  padding: 10px 24px;
  border: 2px solid var(--coral);
  border-radius: 30px;
  background: transparent;
  color: var(--coral);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}

.error-retry:hover {
  background: var(--coral);
  color: #fff;
}

/* ===== BOOKING TAB ===== */
.booking-container {
  background: #fff;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  overflow: hidden;
}

.booking-header {
  padding: 1.5rem 2rem;
  border-bottom: 1px solid var(--gray-100);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.booking-title {
  font-family: 'Oswald', sans-serif;
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--navy);
}

.booking-iframe {
  width: 100%;
  min-height: 600px;
  border: none;
  display: block;
}

.booking-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4rem 2rem;
  text-align: center;
}

.booking-placeholder-icon {
  width: 64px;
  height: 64px;
  background: var(--gray-100);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 1.2rem;
}

.booking-placeholder-icon svg {
  width: 28px;
  height: 28px;
  stroke: var(--gray-500);
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.booking-placeholder-text {
  font-size: 0.95rem;
  color: var(--gray-500);
  margin-bottom: 0.5rem;
}

.booking-placeholder-hint {
  font-size: 0.8rem;
  color: var(--gray-300);
}

/* ===== ANNOUNCEMENTS TAB ===== */
.announcements-container {
  max-width: 700px;
  margin: 0 auto;
}

.announcements-title {
  font-family: 'Oswald', sans-serif;
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 1.5rem;
  letter-spacing: 0.05em;
}

.announcement-empty {
  background: #fff;
  border-radius: var(--radius-lg);
  padding: 3rem 2rem;
  text-align: center;
  box-shadow: var(--shadow-sm);
}

.announcement-empty-icon {
  width: 56px;
  height: 56px;
  background: var(--gray-100);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 1rem;
}

.announcement-empty-icon svg {
  width: 24px;
  height: 24px;
  stroke: var(--gray-300);
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.announcement-empty-text {
  font-size: 0.9rem;
  color: var(--gray-500);
}

/* Announcement Cards (Google Sheets powered) */
/* ===== BOOKING LIST ===== */
.bklist-date-group {
  margin-bottom: 1.5rem;
}

.bklist-date-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.75rem 1rem;
  background: var(--navy);
  color: #fff;
  border-radius: var(--radius-sm);
  font-family: 'Oswald', sans-serif;
  font-size: 1rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  margin-bottom: 0.75rem;
}

.bklist-date-header svg {
  width: 18px;
  height: 18px;
  stroke: var(--coral);
  stroke-width: 2;
  fill: none;
  flex-shrink: 0;
}

.bklist-slot {
  background: #fff;
  border-radius: var(--radius-md);
  padding: 1rem 1.25rem;
  margin-bottom: 0.5rem;
  box-shadow: var(--shadow-sm);
  border-left: 4px solid var(--coral);
}

.bklist-slot-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 0.6rem;
  padding-bottom: 0.6rem;
  border-bottom: 1px solid var(--gray-200);
}

.bklist-slot-info {
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--charcoal);
}

.bklist-slot-info span {
  color: var(--gray-500);
  font-weight: 400;
  margin-left: 0.3rem;
}

.bklist-slot-count {
  font-size: 0.8rem;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 500;
  white-space: nowrap;
}

.bklist-slot-count.full {
  background: #ffe0e0;
  color: #c0392b;
}

.bklist-slot-count.has-space {
  background: #e0f5e0;
  color: #27ae60;
}

.bklist-member {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.4rem 0;
  font-size: 0.88rem;
}

.bklist-member + .bklist-member {
  border-top: 1px dashed var(--gray-200);
}

.bklist-member-icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--gray-100);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.bklist-member-icon svg {
  width: 14px;
  height: 14px;
  stroke: var(--gray-500);
  stroke-width: 2;
  fill: none;
}

.bklist-member-name {
  font-weight: 500;
  color: var(--charcoal);
}

.bklist-member-time {
  font-size: 0.75rem;
  color: var(--gray-500);
  margin-left: auto;
}

.bklist-empty {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--gray-500);
  font-size: 0.95rem;
}

.bklist-empty svg {
  width: 48px;
  height: 48px;
  stroke: var(--gray-300);
  stroke-width: 1.5;
  fill: none;
  display: block;
  margin: 0 auto 1rem;
}

.announce-card {
  background: #fff;
  border-radius: var(--radius-md);
  padding: 1.5rem;
  margin-bottom: 1rem;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s ease;
}

.announce-card:hover {
  box-shadow: var(--shadow-md);
}

.announce-card.important {
  border-left: 4px solid var(--coral);
}

.announce-card-header {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  margin-bottom: 0.6rem;
  flex-wrap: wrap;
}

.announce-date {
  font-family: 'Oswald', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;

<script>
// ===== CONFIGURATION =====
const SPREADSHEET_ID = 'YOUR_SPREADSHEET_ID_HERE'; // Google SpreadsheetのIDをここに入力
const SHEET_NAME = 'Sheet1'; // スケジュール用シート名

const AUTO_REFRESH_INTERVAL = 5 * 60 * 1000; // 自動更新間隔（5分）
const DEMO_MODE = true; // trueならデモデータで動作（テスト用）。本番ではfalseに変更
// =========================

let autoRefreshTimer = null;

// ===== DEMO DATA =====
var demoSlots = [

  { date: '2026/03/26', studio: '稲毛studio(穴川)', time: '19:10〜20:10', class_name: 'FUTUREダンス', max: 8, booked: 3, available: 5 },
];
var demoBookings = JSON.parse(sessionStorage.getItem('btm_demo_bookings') || '[]');

var demoAnnouncements = [
  { date: '2026/03/18', title: '春の体験レッスンキャンペーン開催！', content: '3月20日〜4月10日まで、体験レッスンが無料！\nお友達と一緒の参加も大歓迎です。\n詳しくはお電話またはメールでお問い合わせください。', importance: '重要' },

  { date: '2026/03/10', title: 'GW休講のお知らせ', content: '4/29(火)〜5/6(火)はGWのため全スタジオ休講となります。\n5/7(水)より通常通り再開します。', importance: '' },
];

// ===== PASSWORD GATE =====
(function initGate() {
  const gate = document.getElementById('password-gate');
  const mainContent = document.getElementById('main-content');
  const form = document.getElementById('gate-form');
  const input = document.getElementById('gate-input');
  const inputWrapper = document.getElementById('gate-input-wrapper');
  const errorEl = document.getElementById('gate-error');

  // Check sessionStorage
  if (sessionStorage.getItem('btm_authenticated') === 'true') {
    gate.classList.add('hidden');
    showMainContent();
    return;
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    const value = input.value.trim();

    if (value === PASSWORD) {
      sessionStorage.setItem('btm_authenticated', 'true');
      gate.classList.add('hidden');
      setTimeout(showMainContent, 300);
    } else {
      // Show error with shake
      errorEl.classList.add('visible');
      inputWrapper.classList.add('shake');
      input.value = '';
      input.focus();

      setTimeout(function() {
        inputWrapper.classList.remove('shake');
      }, 500);

      setTimeout(function() {
        errorEl.classList.remove('visible');
      }, 3000);
    }
  });
})();

function showMainContent() {
  var mainContent = document.getElementById('main-content');
  mainContent.style.display = 'block';
  // Force reflow to enable transition
  void mainContent.offsetHeight;
  mainContent.classList.add('visible');

  initTabs();
  initBooking();
  fetchSchedule();
  fetchBookingList();
  fetchAnnouncements();
  startAutoRefresh();
}

// ===== TAB NAVIGATION =====
function initTabs() {
  var buttons = document.querySelectorAll('.tab-button');
  var slider = document.getElementById('tab-slider');

  function updateSlider(button) {
    slider.style.width = button.offsetWidth + 'px';
    slider.style.transform = 'translateX(' + (button.offsetLeft - 4) + 'px)';
  }

  // Initialize slider position
  var activeBtn = document.querySelector('.tab-button.active');
  if (activeBtn) {
    updateSlider(activeBtn);
  }

  buttons.forEach(function(button) {
    button.addEventListener('click', function() {
      var tabName = this.getAttribute('data-tab');

      // Update active button
      buttons.forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');

      // Slide indicator
      updateSlider(this);

      // Show corresponding panel
      document.querySelectorAll('.tab-panel').forEach(function(p) {
        p.classList.remove('active');
      });
      document.getElementById('panel-' + tabName).classList.add('active');
    });
  });

  // Recalculate slider on resize
  window.addEventListener('resize', function() {
    var active = document.querySelector('.tab-button.active');
    if (active) updateSlider(active);
  });
}

// ===== SCHEDULE: GOOGLE SHEETS INTEGRATION =====
function fetchSchedule() {
  var container = document.getElementById('schedule-content');
  var refreshBtn = document.getElementById('refresh-button');

  // Demo mode: show demo schedule
  if (DEMO_MODE) {
    var tableHtml = '<div class="schedule-table-wrapper"><table class="schedule-table"><thead><tr>' +
      '<th>日付</th><th>スタジオ</th><th>時間</th><th>クラス</th><th>ステータス</th></tr></thead><tbody>';
    var cardsHtml = '<div class="schedule-cards">';
    demoSlots.forEach(function(s) {
      var extraBooked = demoBookings.filter(function(b) {
        return b.date === s.date && b.studio === s.studio && b.time === s.time;
      }).length;
      var avail = Math.max(0, s.available - extraBooked);
      var status = avail === 0 ? '満員' : avail <= 2 ? '残りわずか' : '空きあり';
      tableHtml += '<tr><td>' + escapeHtml(s.date) + '</td><td>' + escapeHtml(s.studio) +
        '</td><td>' + escapeHtml(s.time) + '</td><td>' + escapeHtml(s.class_name) +
        '</td><td>' + renderStatusBadge(status) + '</td></tr>';
      cardsHtml += '<div class="schedule-card-item"><div class="schedule-card-date">' +
        escapeHtml(s.date) + '</div>' +
        '<div class="schedule-card-detail"><span class="schedule-card-label">スタジオ</span><span>' + escapeHtml(s.studio) + '</span></div>' +
        '<div class="schedule-card-detail"><span class="schedule-card-label">時間</span><span>' + escapeHtml(s.time) + '</span></div>' +
        '<div class="schedule-card-detail"><span class="schedule-card-label">クラス</span><span>' + escapeHtml(s.class_name) + '</span></div>' +
        '<div class="schedule-card-detail"><span class="schedule-card-label">ステータス</span>' + renderStatusBadge(status) + '</div></div>';
    });
    tableHtml += '</tbody></table></div>';
    cardsHtml += '</div>';
    container.innerHTML = tableHtml + cardsHtml;
    updateTimestamp();
    return;
  }

  // Check if spreadsheet ID is configured
  if (!SPREADSHEET_ID || SPREADSHEET_ID === 'YOUR_SPREADSHEET_ID_HERE') {
    showSetupInstructions(container);
    return;
  }

  // Show loading
  container.innerHTML =
    '<div class="loading-container">' +
      '<div class="spinner"></div>' +
      '<span class="loading-text">スケジュールを読み込み中...</span>' +
    '</div>';

  refreshBtn.classList.add('spinning');

  var url = 'https://docs.google.com/spreadsheets/d/' + SPREADSHEET_ID +
    '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(SHEET_NAME);

  // Use JSONP-style fetch since Google Visualization API returns a callback-wrapped response
  var callbackName = 'googleSheetsCallback_' + Date.now();

  // Fetch via XMLHttpRequest and parse manually
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onload = function() {
    refreshBtn.classList.remove('spinning');

    if (xhr.status === 200) {
      try {
        // Google returns: google.visualization.Query.setResponse({...})
        var text = xhr.responseText;
        var jsonStart = text.indexOf('{');
        var jsonEnd = text.lastIndexOf('}');
        var jsonStr = text.substring(jsonStart, jsonEnd + 1);
        var data = JSON.parse(jsonStr);

        if (data.status === 'ok' && data.table) {
          renderSchedule(data.table, container);
          updateTimestamp();
        } else {
          showError(container, 'データの読み込みに失敗しました');
        }
      } catch (e) {
        showError(container, 'データの解析に失敗しました: ' + e.message);
      }
    } else {
      showError(container, 'スプレッドシートに接続できません (HTTP ' + xhr.status + ')');
    }
  };
  xhr.onerror = function() {
    refreshBtn.classList.remove('spinning');
    showError(container, 'ネットワークエラーが発生しました');
  };
  xhr.send();
}

function renderSchedule(table, container) {
  var cols = table.cols || [];
  var rows = table.rows || [];

  if (rows.length === 0) {
    container.innerHTML =
      '<div class="error-container">' +
        '<div class="error-icon">&#128196;</div>' +
        '<p class="error-message">スケジュールデータがありません</p>' +
      '</div>';
    return;
  }

  // Get column headers
  var headers = cols.map(function(col) {
    return col.label || '';
  });

  // Build table HTML (desktop)
  var tableHtml = '<div class="schedule-table-wrapper"><table class="schedule-table"><thead><tr>';
  headers.forEach(function(h) {
    tableHtml += '<th>' + escapeHtml(h) + '</th>';
  });
  tableHtml += '</tr></thead><tbody>';

  rows.forEach(function(row) {
    tableHtml += '<tr>';
    var cells = row.c || [];
    cells.forEach(function(cell, i) {
      var value = cell ? (cell.f || cell.v || '') : '';
      value = String(value);

      // Check if this is a status column (by header name)
      var headerLower = (headers[i] || '').toLowerCase();
      if (headerLower.indexOf('ステータス') !== -1 || headerLower.indexOf('status') !== -1) {
        tableHtml += '<td>' + renderStatusBadge(value) + '</td>';
      } else {
        tableHtml += '<td>' + escapeHtml(value) + '</td>';
      }
    });
    tableHtml += '</tr>';
  });

  tableHtml += '</tbody></table></div>';

  // Build card HTML (mobile)
  var cardsHtml = '<div class="schedule-cards">';
  rows.forEach(function(row) {
    var cells = row.c || [];
    var firstValue = cells[0] ? (cells[0].f || cells[0].v || '') : '';
    cardsHtml += '<div class="schedule-card-item">';
    cardsHtml += '<div class="schedule-card-date">' + escapeHtml(String(firstValue)) + '</div>';

    for (var i = 1; i < cells.length; i++) {
      var val = cells[i] ? (cells[i].f || cells[i].v || '') : '';
      val = String(val);
      var header = headers[i] || '';
      var headerLower = header.toLowerCase();

      cardsHtml += '<div class="schedule-card-detail">';
      cardsHtml += '<span class="schedule-card-label">' + escapeHtml(header) + '</span>';

      if (headerLower.indexOf('ステータス') !== -1 || headerLower.indexOf('status') !== -1) {
        cardsHtml += renderStatusBadge(val);
      } else {
        cardsHtml += '<span>' + escapeHtml(val) + '</span>';
      }

      cardsHtml += '</div>';
    }

    cardsHtml += '</div>';
  });
  cardsHtml += '</div>';

  container.innerHTML = tableHtml + cardsHtml;
}

function renderStatusBadge(value) {
  var lower = value.toLowerCase();
  var cls = 'status-default';

  if (lower.indexOf('空き') !== -1 || lower.indexOf('open') !== -1 || lower === 'ok' || lower === 'o') {
    cls = 'status-open';
  } else if (lower.indexOf('満') !== -1 || lower.indexOf('closed') !== -1 || lower === 'x' || lower.indexOf('締切') !== -1) {
    cls = 'status-closed';
  } else if (lower.indexOf('残') !== -1 || lower.indexOf('few') !== -1 || lower.indexOf('わずか') !== -1) {
    cls = 'status-few';
  }

  return '<span class="status-badge ' + cls + '">' + escapeHtml(value) + '</span>';
}

var currentBookingSlot = null;

function initBooking() {
  fetchBookingSlots();

  // Modal close on overlay click
  document.getElementById('booking-modal').addEventListener('click', function(e) {
    if (e.target === this) closeBookingModal();
  });

  // Booking form submit
  document.getElementById('booking-form').addEventListener('submit', function(e) {
    e.preventDefault();
    submitBooking();
  });
}

function fetchBookingSlots() {
  var container = document.getElementById('booking-content');

  // Demo mode: use local data
  if (DEMO_MODE) {
    // Recalculate availability based on demo bookings
    var slots = demoSlots.map(function(s) {
      var extraBooked = demoBookings.filter(function(b) {
        return b.date === s.date && b.studio === s.studio && b.time === s.time;
      }).length;
      return {
        date: s.date, studio: s.studio, time: s.time, class_name: s.class_name,
        max: s.max, booked: s.booked + extraBooked,
        available: Math.max(0, s.available - extraBooked)
      };
    });
    renderBookingSlots(slots, container);
    return;
  }

  if (!APPS_SCRIPT_URL) {
    showBookingSetup(container);
    return;
  }

  container.innerHTML =
    '<div class="loading-container">' +
      '<div class="spinner"></div>' +
      '<span class="loading-text">空きレッスンを読み込み中...</span>' +
    '</div>';

  var url = APPS_SCRIPT_URL + '?action=slots';
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onload = function() {
    if (xhr.status === 200) {
      try {
        var data = JSON.parse(xhr.responseText);
        renderBookingSlots(data, container);
      } catch (e) {
        showError(container, 'データの解析に失敗しました');
      }
    } else {
      showError(container, '接続に失敗しました (HTTP ' + xhr.status + ')');
    }
  };
  xhr.onerror = function() {
    showError(container, 'ネットワークエラーが発生しました');
  };
  xhr.send();
}

function renderBookingSlots(slots, container) {
  if (!slots || slots.length === 0) {
    container.innerHTML =
      '<div class="error-container">' +
        '<div class="error-icon">&#128197;</div>' +
        '<p class="error-message">現在予約可能なレッスンはありません</p>' +
      '</div>';
    return;
  }

  // Group by date
  var grouped = {};
  slots.forEach(function(slot) {
    var date = slot.date || '日付未定';
    if (!grouped[date]) grouped[date] = [];
    grouped[date].push(slot);
  });

  var html = '';
  Object.keys(grouped).forEach(function(date) {
    html += '<div class="booking-date-group">';
    html += '<div class="booking-date-label">' + escapeHtml(date) + '</div>';
    html += '<div class="booking-slots-grid">';

    grouped[date].forEach(function(slot, i) {
      var available = slot.available || 0;
      var spotClass = available <= 2 ? 'few' : '';
      if (available <= 0) spotClass = 'full';

      html += '<div class="slot-card">';
      html += '<div class="slot-card-info">';
      html += '<span class="slot-tag studio">' + escapeHtml(slot.studio || '') + '</span>';
      html += '<span class="slot-tag time">' + escapeHtml(slot.time || '') + '</span>';
      html += '<span class="slot-tag">' + escapeHtml(slot.class_name || '') + '</span>';
      html += '</div>';
      html += '<div class="slot-availability">';
      html += '<span class="slot-spots ' + spotClass + '">残り <strong>' + available + '</strong> 枠</span>';

      if (available > 0) {
        html += '<button class="slot-book-btn" onclick=\'openBookingModal(' +
          JSON.stringify(slot).replace(/'/g, "\\'") + ')\'>予約する</button>';
      } else {
        html += '<button class="slot-book-btn" disabled>満員</button>';
      }

      html += '</div>';
      html += '</div>';
    });

    html += '</div></div>';
  });

  container.innerHTML = html;
}

function submitBooking() {
  if (!currentBookingSlot) return;

  var name = document.getElementById('booking-name').value.trim();
  var phone = document.getElementById('booking-phone').value.trim();

  if (!name) {
    document.getElementById('booking-name').focus();
    return;
  }

  var btn = document.getElementById('booking-submit-btn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  // Demo mode: save to sessionStorage
  if (DEMO_MODE) {
    setTimeout(function() {
      demoBookings.push({
        date: currentBookingSlot.date,
        studio: currentBookingSlot.studio,
        time: currentBookingSlot.time,
        class_name: currentBookingSlot.class_name,
        name: name,
        phone: phone,
        bookedAt: new Date().toISOString()
      });
      sessionStorage.setItem('btm_demo_bookings', JSON.stringify(demoBookings));
      showBookingSuccess(name);
    }, 800);
    return;
  }

  var params = new URLSearchParams({
    action: 'book',
    date: currentBookingSlot.date || '',
    studio: currentBookingSlot.studio || '',
    time: currentBookingSlot.time || '',
    class_name: currentBookingSlot.class_name || '',
    name: name,
    phone: phone
  });

  var url = APPS_SCRIPT_URL + '?' + params.toString();
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onload = function() {
    if (xhr.status === 200) {
      try {
        var result = JSON.parse(xhr.responseText);
        if (result.success) {
          showBookingSuccess(name);
        } else {
          btn.disabled = false;
          btn.textContent = '予約する';
          alert(result.error || '予約に失敗しました');
        }
      } catch (e) {
        showBookingSuccess(name); // Assume success if can't parse (no-cors)
      }
    } else {
      btn.disabled = false;
      btn.textContent = '予約する';
      alert('通信エラーが発生しました');
    }
  };
  xhr.onerror = function() {
    // Google Apps Script redirects may cause onerror with no-cors, treat as success
    showBookingSuccess(name);
  };
  xhr.send();
}

function showBookingSuccess(name) {
  var body = document.getElementById('booking-modal-body');
  body.innerHTML =
    '<div class="booking-success">' +
      '<div class="booking-success-icon">&#10003;</div>' +
      '<h4>予約完了！</h4>' +
      '<p>' + escapeHtml(name) + ' さんの予約を受け付けました</p>' +
      '<br>' +

function fetchBookingList() {
  var container = document.getElementById('bookinglist-content');

  // Demo mode
  if (DEMO_MODE) {
    // Build demo booking list from demoSlots + demoBookings
    var demoList = [];
    var dateMap = {};

    // Add pre-set bookings from demo slots
    demoSlots.forEach(function(s) {
      if (!dateMap[s.date]) dateMap[s.date] = {};
      var slotKey = s.studio + '|' + s.time + '|' + s.class_name;
      if (!dateMap[s.date][slotKey]) {
        dateMap[s.date][slotKey] = {
          studio: s.studio, time: s.time, class_name: s.class_name,
          max: s.max, members: []
        };
      }
      // Add fake pre-booked members
      for (var i = 0; i < s.booked; i++) {
        var names = ['田中さくら','鈴木はると','佐藤ゆい','山田れん','高橋あおい','伊藤そら','渡辺ひなた','中村みお'];
        dateMap[s.date][slotKey].members.push({
          name: names[i % names.length],
          phone: '',
          booked_at: '03/18 10:' + (10 + i * 5)
        });
      }
    });

    // Add session bookings
    demoBookings.forEach(function(b) {
      if (!dateMap[b.date]) dateMap[b.date] = {};
      var slotKey = b.studio + '|' + b.time + '|' + b.class_name;
      if (!dateMap[b.date][slotKey]) {
        var slot = demoSlots.find(function(s) {
          return s.date === b.date && s.studio === b.studio && s.time === b.time;
        });
        dateMap[b.date][slotKey] = {
          studio: b.studio, time: b.time, class_name: b.class_name,
          max: slot ? slot.max : 10, members: []
        };
      }
      dateMap[b.date][slotKey].members.push({
        name: b.name,
        phone: b.phone || '',
        booked_at: new Date(b.bookedAt).toLocaleString('ja-JP', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})
      });
    });

    var dates = Object.keys(dateMap).sort();
    var result = dates.map(function(d) {
      var slots = Object.keys(dateMap[d]).map(function(k) { return dateMap[d][k]; });
      return { date: d, slots: slots };
    });

    renderBookingList(result, container);
    return;
  }

  if (!APPS_SCRIPT_URL) {
    container.innerHTML = '<div class="bklist-empty">' +
      '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>' +
      '<p>APPS_SCRIPT_URL を設定すると予約一覧が表示されます</p></div>';
    return;
  }

  container.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--gray-500);">読み込み中...</div>';

  fetch(APPS_SCRIPT_URL + '?action=list')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        container.innerHTML = '<div class="bklist-empty"><p>' + escapeHtml(data.error) + '</p></div>';
        return;
      }
      renderBookingList(data, container);
    })
    .catch(function(err) {
      container.innerHTML = '<div class="bklist-empty"><p>読み込みエラー: ' + escapeHtml(err.message) + '</p></div>';
    });
}

function renderBookingList(data, container) {
  if (!data || data.length === 0) {
    container.innerHTML = '<div class="bklist-empty">' +
      '<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' +
      '<p>予約はまだありません</p></div>';
    return;
  }

  var html = '';
  var today = new Date();
  today.setHours(0,0,0,0);

  data.forEach(function(dateGroup) {
    // Parse date for day of week
    var parts = dateGroup.date.split('/');
    var dateObj = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    var days = ['日','月','火','水','木','金','土'];
    var dayStr = days[dateObj.getDay()];
    var isPast = dateObj < today;

    html += '<div class="bklist-date-group"' + (isPast ? ' style="opacity:0.5"' : '') + '>';
    html += '<div class="bklist-date-header">';
    html += '<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';
    html += escapeHtml(dateGroup.date) + '（' + dayStr + '）';
    if (isPast) html += ' <span style="font-size:0.75rem;opacity:0.7;margin-left:0.5rem">終了</span>';
    html += '</div>';

    dateGroup.slots.forEach(function(slot) {
      var count = slot.members.length;
      var max = slot.max || 10;
      var isFull = count >= max;
      var countClass = isFull ? 'full' : 'has-space';

      html += '<div class="bklist-slot">';
      html += '<div class="bklist-slot-header">';
      html += '<div class="bklist-slot-info">' + escapeHtml(slot.class_name) +
        '<span>' + escapeHtml(slot.studio) + ' / ' + escapeHtml(slot.time) + '</span></div>';
      html += '<div class="bklist-slot-count ' + countClass + '">' + count + ' / ' + max + '名</div>';
      html += '</div>';

      if (count === 0) {
        html += '<div style="color:var(--gray-500);font-size:0.85rem;padding:0.3rem 0;">予約者なし</div>';
      } else {
        slot.members.forEach(function(m) {
          html += '<div class="bklist-member">';
          html += '<div class="bklist-member-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>';
          html += '<span class="bklist-member-name">' + escapeHtml(m.name) + '</span>';
          if (m.booked_at) html += '<span class="bklist-member-time">' + escapeHtml(m.booked_at) + '</span>';
          html += '</div>';
        });
      }

      html += '</div>';
    });

    html += '</div>';
  });

  container.innerHTML = html;
}

function fetchAnnouncements() {
  var container = document.getElementById('announcements-content');

  // Demo mode
  if (DEMO_MODE) {
    var html = '';
    for (var i = demoAnnouncements.length - 1; i >= 0; i--) {
      var a = demoAnnouncements[i];
      var isImportant = a.importance === '重要';
      var cardClass = isImportant ? 'announce-card important' : 'announce-card';
      html += '<div class="' + cardClass + '">';
      html += '<div class="announce-card-header">';
      html += '<span class="announce-date">' + escapeHtml(a.date) + '</span>';
      if (isImportant) html += '<span class="announce-badge-important">重要</span>';
      html += '</div>';
      html += '<h4>' + escapeHtml(a.title) + '</h4>';
      html += '<p>' + escapeHtml(a.content) + '</p>';
      html += '</div>';
    }
    container.innerHTML = html;
    return;
  }

  if (!SPREADSHEET_ID || SPREADSHEET_ID === 'YOUR_SPREADSHEET_ID_HERE') {
    container.innerHTML =
      '<div class="setup-card">' +
        '<h3>お知らせセットアップ</h3>' +
        '<p class="setup-subtitle">Googleスプレッドシートに「お知らせ」シートを追加してください</p>' +
        '<ol class="setup-steps">' +
          '<li>スケジュール用と同じスプレッドシートに新しいシートを追加</li>' +
          '<li>シート名を「お知らせ」に変更</li>' +
          '<li>以下のカラムを1行目に追加:' +
            '<div class="setup-columns">' +
              '<span class="setup-column-tag">日付</span>' +
              '<span class="setup-column-tag">タイトル</span>' +
              '<span class="setup-column-tag">内容</span>' +
              '<span class="setup-column-tag">重要度</span>' +
            '</div>' +
          '</li>' +
          '<li>重要度は「重要」と入力すると赤バッジが付きます（空欄=通常）</li>' +
        '</ol>' +
      '</div>';
    return;
  }

  container.innerHTML =
    '<div class="loading-container">' +
      '<div class="spinner"></div>' +
      '<span class="loading-text">お知らせを読み込み中...</span>' +
    '</div>';

  var url = 'https://docs.google.com/spreadsheets/d/' + SPREADSHEET_ID +
    '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(ANNOUNCE_SHEET);

  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onload = function() {
    if (xhr.status === 200) {
      try {
        var text = xhr.responseText;
        var jsonStart = text.indexOf('{');
        var jsonEnd = text.lastIndexOf('}');
        var data = JSON.parse(text.substring(jsonStart, jsonEnd + 1));

        if (data.status === 'ok' && data.table) {
          renderAnnouncements(data.table, container);
        } else {
          showAnnounceEmpty(container);
        }
      } catch (e) {
        showAnnounceEmpty(container);
      }
    } else {
      showAnnounceEmpty(container);
    }
  };
  xhr.onerror = function() {
    showAnnounceEmpty(container);
  };
  xhr.send();
}

function renderAnnouncements(table, container) {
  var rows = table.rows || [];

  if (rows.length === 0) {
    showAnnounceEmpty(container);
    return;
  }

  // Reverse order (newest first)
  var html = '';
  for (var i = rows.length - 1; i >= 0; i--) {
    var cells = rows[i].c || [];
    var date = cells[0] ? (cells[0].f || cells[0].v || '') : '';
    var title = cells[1] ? (cells[1].f || cells[1].v || '') : '';
    var content = cells[2] ? (cells[2].f || cells[2].v || '') : '';
    var importance = cells[3] ? (cells[3].f || cells[3].v || '') : '';

    var isImportant = String(importance).indexOf('重要') !== -1;
    var cardClass = isImportant ? 'announce-card important' : 'announce-card';

    html += '<div class="' + cardClass + '">';
    html += '<div class="announce-card-header">';
    html += '<span class="announce-date">' + escapeHtml(String(date)) + '</span>';
    if (isImportant) {
      html += '<span class="announce-badge-important">重要</span>';
    }
    html += '</div>';
    html += '<h4>' + escapeHtml(String(title)) + '</h4>';
    html += '<p>' + escapeHtml(String(content)) + '</p>';
    html += '</div>';
  }

  container.innerHTML = html;
}

function showAnnounceEmpty(container) {
  container.innerHTML =
    '<div class="announcement-empty">' +
      '<div class="announcement-empty-icon">' +
        '<svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>' +
      '</div>' +
      '<p class="announcement-empty-text">お知らせはまだありません</p>' +
    '</div>';
}

// ===== UTILITIES =====
function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}
</script>

</body>
</html>
