<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メンバーポータル | BEAT THE MIX</title>
<meta name="description" content="BEAT THE MIX 会員専用ページ。レッスンスケジュール・予約・お知らせ。">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --cream: #FBF7F0;
  --charcoal: #1a1a1a;
  --coral: #FF6B35;
  --navy: #0D1B2A;
  --coral-light: #ff8c5e;
  --coral-dark: #e55a28;
  --navy-light: #1B2D45;
  --gray-100: #f5f0e8;
  --gray-200: #e8e0d4;
  --gray-300: #d0c8bc;
  --gray-500: #8a8278;
  --shadow-sm: 0 1px 3px rgba(13, 27, 42, 0.08);
  --shadow-md: 0 4px 12px rgba(13, 27, 42, 0.1);
  --shadow-lg: 0 8px 30px rgba(13, 27, 42, 0.12);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  background-color: var(--cream);
  color: var(--charcoal);
  line-height: 1.7;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== PASSWORD GATE ===== */
#password-gate {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--navy);
  transition: opacity 0.5s ease, visibility 0.5s ease;
  overflow: hidden;
}

#password-gate.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.gate-container {
  text-align: center;
  padding: 2rem;
  max-width: 400px;
  width: 100%;
}

.gate-logo {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 0.3em;
  color: var(--coral);
  margin-bottom: 2.5rem;
  text-transform: uppercase;
}

.gate-title {
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 2.5rem;
  letter-spacing: 0.15em;
  color: #fff;
  margin-bottom: 0.5rem;
}

.gate-subtitle {
  font-size: 0.9rem;
  color: rgba(255, 255, 255, 0.5);
  letter-spacing: 0.1em;
  margin-bottom: 3rem;
  font-weight: 300;
}

.gate-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  align-items: center;
}

.gate-input-wrapper {
  position: relative;
  width: 100%;
  max-width: 300px;
}

.gate-toggle-pw {
  position: absolute;
  right: 52px;
  top: 50%;
  transform: translateY(-50%);
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 50%;
  background: transparent;
  color: rgba(255, 255, 255, 0.6);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.2s ease;
  padding: 0;
}

.gate-toggle-pw:hover {
  color: rgba(255, 255, 255, 0.9);
}

.gate-toggle-pw svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.gate-input {
  width: 100%;
  padding: 14px 84px 14px 20px;
  border: 2px solid rgba(255, 255, 255, 0.15);
  border-radius: 50px;
  background: rgba(255, 255, 255, 0.05);
  color: #fff;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.15em;
  outline: none;
  transition: border-color 0.3s ease, background 0.3s ease;
}

.gate-input::placeholder {
  color: rgba(255, 255, 255, 0.3);
  letter-spacing: 0.05em;
}

.gate-input:focus {
  border-color: var(--coral);
  background: rgba(255, 255, 255, 0.08);
}

.gate-submit {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  width: 40px;
  height: 40px;
  border: none;
  border-radius: 50%;
  background: var(--coral);
  color: #fff;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s ease, transform 0.2s ease;
}

.gate-submit:hover {
  background: var(--coral-light);
}

.gate-submit:active {
  transform: translateY(-50%) scale(0.95);
}

.gate-submit svg {
  width: 18px;
  height: 18px;
  fill: none;
  stroke: #fff;
  stroke-width: 2.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.gate-error {
  color: var(--coral);
  font-size: 0.85rem;
  height: 1.5em;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.gate-error.visible {
  opacity: 1;
}

.gate-input-wrapper.shake {
  animation: shake 0.5s ease-in-out;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  15% { transform: translateX(-8px); }
  30% { transform: translateX(8px); }
  45% { transform: translateX(-6px); }
  60% { transform: translateX(6px); }
  75% { transform: translateX(-3px); }
  90% { transform: translateX(3px); }
}

.gate-decoration {
  position: absolute;
  border-radius: 50%;
  opacity: 0.03;
  background: var(--coral);
}

.gate-decoration-1 {
  width: 400px;
  height: 400px;
  top: -100px;
  right: -100px;
}

.gate-decoration-2 {
  width: 300px;
  height: 300px;
  bottom: -80px;
  left: -80px;
}

/* ===== MAIN CONTENT ===== */
#main-content {
  display: none;
  opacity: 0;
  transition: opacity 0.5s ease;
}

#main-content.visible {
  display: block;
  opacity: 1;
}

/* ===== NAVBAR ===== */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(251, 247, 240, 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--gray-200);
  padding: 0 1.5rem;
}

.navbar-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
}

.navbar-back {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  text-decoration: none;
  color: var(--gray-500);
  font-size: 0.85rem;
  font-weight: 500;
  transition: color 0.2s ease;
}

.navbar-back:hover {
  color: var(--coral);
}

.navbar-back svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.navbar-brand {
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 0.85rem;
  letter-spacing: 0.2em;
  color: var(--navy);
  text-transform: uppercase;
}

.navbar-member-badge {
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  color: var(--coral);
  background: rgba(255, 107, 53, 0.08);
  padding: 4px 10px;
  border-radius: 20px;
  text-transform: uppercase;
}

.navbar-signout {
  background: none;
  border: none;
  color: var(--gray-400);
  cursor: pointer;
  padding: 4px;
  border-radius: 6px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
}

.navbar-signout:hover {
  color: var(--coral);
  background: rgba(255, 107, 53, 0.08);
}

/* ===== TABS ===== */
.tabs-container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 1.5rem 1.5rem 0;
}

.tabs {
  display: flex;
  gap: 0;
  background: var(--gray-100);
  border-radius: var(--radius-md);
  padding: 4px;
  position: relative;
}

.tab-button {
  flex: 1;
  padding: 12px 1.5rem;
  border: none;
  background: transparent;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--gray-500);
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: color 0.3s ease;
  position: relative;
  z-index: 1;
  white-space: nowrap;
}

.tab-button:hover {
  color: var(--charcoal);
}

.tab-button.active {
  color: var(--charcoal);
}

.tab-slider {
  position: absolute;
  top: 4px;
  left: 4px;
  height: calc(100% - 8px);
  background: #fff;
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-sm);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 0;
}

/* ===== TAB PANELS ===== */
.tab-panels {
  max-width: 1100px;
  margin: 0 auto;
  padding: 1.5rem;
}

.tab-panel {
  display: none;
  animation: fadeIn 0.4s ease;
}

.tab-panel.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== CATEGORY TOGGLE (KIDS / FUTURE) ===== */
.category-toggle {
  display: flex;
  gap: 0;
  background: var(--gray-100);
  border-radius: var(--radius-md);
  padding: 4px;
  margin-bottom: 1.5rem;
  max-width: 320px;
}

.category-btn {
  flex: 1;
  padding: 10px 1.5rem;
  border: none;
  background: transparent;
  font-family: 'Oswald', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--gray-500);
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: all 0.3s ease;
}

.category-btn:hover {
  color: var(--charcoal);
}

.category-btn.active[data-category="kids"] {
  background: var(--coral);
  color: #fff;
}

.category-btn.active[data-category="future"] {
  background: var(--navy);
  color: #fff;
}

/* ===== CALENDAR ===== */
.calendar-container {
  background: #fff;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  overflow: hidden;
  margin-bottom: 1.5rem;
}

.calendar-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--gray-100);
}

.calendar-nav-btn {
  width: 36px;
  height: 36px;
  border: 1px solid var(--gray-200);
  border-radius: 50%;
  background: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  color: var(--charcoal);
  font-size: 0.85rem;
}

.calendar-nav-btn:hover {
  border-color: var(--coral);
  color: var(--coral);
}

.calendar-nav-btn svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.calendar-month-label {
  font-family: 'Oswald', sans-serif;
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--navy);
  letter-spacing: 0.05em;
}

.calendar-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 0.5rem 0.75rem;
  border-bottom: 1px solid var(--gray-100);
}

.calendar-weekday {
  text-align: center;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--gray-500);
  padding: 0.25rem 0;
}

.calendar-weekday:nth-child(6) { color: #2979FF; }
.calendar-weekday:nth-child(7) { color: var(--coral); }

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 0.5rem 0.75rem 0.75rem;
  gap: 2px;
}

.calendar-day {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
  min-height: 44px;
  gap: 2px;
}

.calendar-day:hover:not(.empty):not(.other-month) {
  background: var(--gray-100);
}

.calendar-day.empty {
  cursor: default;
}

.calendar-day.other-month {
  opacity: 0.25;
  cursor: default;
}

.day-number {
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--charcoal);
  line-height: 1;
}

/* Saturday/Sunday colors (grid maintains position via empty cells) */
.calendar-day:nth-child(7n+6) .day-number { color: #2979FF; }
.calendar-day:nth-child(7n) .day-number { color: var(--coral); }

.calendar-day.today {
  background: rgba(255, 107, 53, 0.08);
}

.calendar-day.today .day-number {
  font-weight: 700;
}

.calendar-day.selected {
  background: var(--coral);
}

.calendar-day.selected .day-number {
  color: #fff !important;
}

.category-future .calendar-day.selected {
  background: var(--navy);
}

/* Lesson day highlight - border + background */
.calendar-day.has-lessons {
  background: rgba(255, 107, 53, 0.08);
  border: 2px solid var(--coral);
}

.category-future .calendar-day.has-lessons {
  background: rgba(13, 27, 42, 0.06);
  border-color: var(--navy);
}

.calendar-day.has-lessons.today {
  background: rgba(255, 107, 53, 0.18);
}

.category-future .calendar-day.has-lessons.today {
  background: rgba(13, 27, 42, 0.12);
}

.calendar-day.has-lessons.selected {
  border-color: transparent;
}

.day-dot {
  width: 20px;
  height: 3px;
  border-radius: 2px;
  background: var(--coral);
}

.category-future .day-dot {
  background: var(--navy);
}

.calendar-day.selected .day-dot {
  background: rgba(255,255,255,0.7);
}

/* Regular lesson day - solid filled background */
.calendar-day.has-regular {
  background: var(--coral);
  border: none;
}

.calendar-day.has-regular .day-number {
  color: #fff !important;
}

.calendar-day.has-regular .day-dot {
  background: rgba(255,255,255,0.7);
}

.category-future .calendar-day.has-regular {
  background: var(--navy);
}

.calendar-day.has-regular.selected {
  opacity: 0.85;
}

/* Regular lesson card */
.slot-card.regular-lesson {
  border-left: 4px solid var(--coral);
  background: rgba(255, 107, 53, 0.06);
}

.category-future .slot-card.regular-lesson {
  border-left-color: var(--navy);
  background: rgba(13, 27, 42, 0.04);
}

.regular-lesson-badge {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: 600;
  color: #fff;
  background: var(--coral);
  padding: 2px 8px;
  border-radius: 10px;
  letter-spacing: 0.03em;
}

.category-future .regular-lesson-badge {
  background: var(--navy);
}

/* ===== DAY LESSONS ===== */
.day-lessons-header {
  font-family: 'Oswald', sans-serif;
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 2px solid var(--gray-100);
  letter-spacing: 0.03em;
}

.day-lessons-empty {
  text-align: center;
  padding: 2rem 1rem;
  color: var(--gray-500);
  font-size: 0.9rem;
  background: #fff;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
}

.day-lessons-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1rem;
}

/* ===== LOADING / ERROR ===== */
.loading-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4rem 2rem;
  gap: 1.2rem;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--gray-200);
  border-top-color: var(--coral);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.loading-text {
  font-size: 0.85rem;
  color: var(--gray-500);
}

.error-container {
  text-align: center;
  padding: 3rem 2rem;
}

.error-icon {
  font-size: 2.5rem;
  margin-bottom: 1rem;
  opacity: 0.3;
}

.error-message {
  font-size: 0.9rem;
  color: var(--gray-500);
  margin-bottom: 1rem;
}

.error-retry {
  padding: 10px 24px;
  border: 2px solid var(--coral);
  border-radius: 30px;
  background: transparent;
  color: var(--coral);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}

.error-retry:hover {
  background: var(--coral);
  color: #fff;
}

/* ===== SETUP INSTRUCTIONS ===== */
.setup-card {
  background: #fff;
  border-radius: var(--radius-lg);
  padding: 2.5rem;
  box-shadow: var(--shadow-md);
  max-width: 700px;
  margin: 0 auto;
}

.setup-card h3 {
  font-family: 'Oswald', sans-serif;
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 0.5rem;
}

.setup-card .setup-subtitle {
  font-size: 0.85rem;
  color: var(--gray-500);
  margin-bottom: 2rem;
}

.setup-steps {
  list-style: none;
  counter-reset: step-counter;
}

.setup-steps li {
  counter-increment: step-counter;
  padding: 1rem 0 1rem 3.2rem;
  border-bottom: 1px solid var(--gray-100);
  position: relative;
  font-size: 0.9rem;
  line-height: 1.6;
}

.setup-steps li:last-child {
  border-bottom: none;
}

.setup-steps li::before {
  content: counter(step-counter);
  position: absolute;
  left: 0;
  top: 1rem;
  width: 28px;
  height: 28px;
  background: var(--coral);
  color: #fff;
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 0.85rem;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.setup-steps code {
  background: var(--gray-100);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.82rem;
  color: var(--coral-dark);
  font-family: 'Consolas', 'Courier New', monospace;
  word-break: break-all;
}

.setup-columns {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-top: 0.5rem;
}

.setup-column-tag {
  background: var(--navy);
  color: #fff;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 500;
}

/* ===== SLOT CARDS ===== */
.slot-card {
  background: #fff;
  border-radius: var(--radius-md);
  padding: 1.2rem 1.5rem;
  box-shadow: var(--shadow-sm);
  border-left: 4px solid var(--coral);
  transition: box-shadow 0.2s ease, transform 0.2s ease;
}

.category-future .slot-card {
  border-left-color: var(--navy);
}

.category-future .slot-book-btn {
  background: var(--navy);
}

.category-future .slot-book-btn:hover {
  background: #1a3a5c;
}

.category-future .slot-tag.time {
  background: rgba(13,27,42,0.08);
  color: var(--navy);
}

.category-future .calendar-nav-btn:hover {
  border-color: var(--navy);
  color: var(--navy);
}

.category-future .calendar-day.today {
  background: rgba(13, 27, 42, 0.06);
}

.slot-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

.slot-card-info {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 0.8rem;
}

.slot-tag {
  font-size: 0.78rem;
  padding: 3px 10px;
  border-radius: 20px;
  background: var(--gray-100);
  color: var(--charcoal);
}

.slot-tag.studio { background: rgba(13,27,42,0.08); color: var(--navy); }
.slot-tag.time { background: rgba(255,107,53,0.08); color: var(--coral); }

.slot-availability {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 0.5rem;
  padding-top: 0.8rem;
  border-top: 1px solid var(--gray-100);
}

.slot-spots {
  font-size: 0.85rem;
  color: var(--gray-500);
}

.slot-spots strong {
  color: #2e7d32;
  font-size: 1.1rem;
}

.slot-spots.few strong { color: #e65100; }
.slot-spots.full strong { color: #c62828; }

.slot-book-btn {
  padding: 8px 20px;
  border: none;
  border-radius: 30px;
  background: var(--coral);
  color: #fff;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.82rem;

function isKidsSlot(slot) {
  if (slot.category) return slot.category === 'KIDS';
  var cn = (slot.class_name || '').toLowerCase();
  return cn.indexOf('kids') !== -1 || cn.indexOf('teen') !== -1 || cn.indexOf('レベルアップ') !== -1;
}

function isFutureSlot(slot) {
  if (slot.category) return slot.category === 'FUTURE';
  var cn = (slot.class_name || '').toLowerCase();
  return cn.indexOf('future') !== -1;
}

function getAllDemoSlots() {
  // Merge base + admin-added, then exclude deleted
  var all = demoSlots.concat(demoAdminSlots);
  return all.filter(function(s) {
    return !demoDeletedSlots.some(function(d) {
      return d.date === s.date && d.studio === s.studio && d.time === s.time;
    });
  });
}

function getFilteredSlots() {
  var filterFn = currentCategory === 'kids' ? isKidsSlot : isFutureSlot;

  if (DEMO_MODE) {
    return getAllDemoSlots().filter(filterFn).map(function(s) {
      var extraBooked = demoBookings.filter(function(b) {
        return b.date === s.date && b.studio === s.studio && b.time === s.time;
      }).length;
      return {
        date: s.date, studio: s.studio, time: s.time, class_name: s.class_name,
        max: s.max, booked: (s.booked || 0) + extraBooked,
        available: (s.max === 0 || s.max === '0') ? 999 : Math.max(0, (s.available != null ? s.available : s.max) - (s.booked || 0) - extraBooked),
        category: s.category, members: s.members
      };
    });
  }

  return allSlots.filter(filterFn);
}

function initCalendar() {
  var slotsReady = false;
  var regularsReady = false;

  function tryRender() {
    if (slotsReady && regularsReady) renderCalendar();
  }

  if (!DEMO_MODE && APPS_SCRIPT_URL) {
    fetchSlotsFromAPI(function() { slotsReady = true; tryRender(); });
  } else {
    slotsReady = true;
  }

  fetchRegularLessons(function() { regularsReady = true; tryRender(); });

  if (DEMO_MODE) tryRender();
}

// ===== REGULAR LESSONS =====
var DAY_NAME_MAP = { '日': 0, '月': 1, '火': 2, '水': 3, '木': 4, '金': 5, '土': 6 };

function fetchRegularLessons(callback) {
  if (!APPS_SCRIPT_URL) {
    if (callback) callback();
    return;
  }

  fetch(APPS_SCRIPT_URL + '?action=regularLessons', { redirect: 'follow' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && data.length > 0) {
        regularLessons = [];
        data.forEach(function(item) {
          var dow = DAY_NAME_MAP[item.dayOfWeek];
          if (dow !== undefined && item.class_name) {
            regularLessons.push({
              dayOfWeek: dow,
              studio: item.studio || '',
              time: item.time || '',
              class_name: item.class_name,
              category: (item.category || 'KIDS').toUpperCase()
            });
          }
        });
      }
      if (callback) callback();
    })
    .catch(function() { if (callback) callback(); });
}

function getRegularLessonsForDate(dateStr) {
  var parts = dateStr.split('/');
  var dateObj = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
  var dow = dateObj.getDay();
  var filterFn = currentCategory === 'kids' ? isKidsSlot : isFutureSlot;

  return regularLessons.filter(function(r) {
    return r.dayOfWeek === dow && filterFn(r);
  });
}

function fetchSlotsFromAPI(callback) {
  fetch(APPS_SCRIPT_URL + '?action=slots', { redirect: 'follow' })
    .then(function(r) { return r.json(); })
    .then(function(data) { allSlots = data; if (callback) callback(); })
    .catch(function() { allSlots = []; if (callback) callback(); });
}

function renderCalendar() {
  var year = currentMonth.getFullYear();
  var month = currentMonth.getMonth();

  document.getElementById('calendar-month-label').textContent = year + '年 ' + (month + 1) + '月';

  var grid = document.getElementById('calendar-grid');
  var firstDay = new Date(year, month, 1).getDay();
  var startOffset = (firstDay + 6) % 7; // Monday = 0
  var daysInMonth = new Date(year, month + 1, 0).getDate();

  var today = new Date();
  var todayStr = today.getFullYear() + '/' + String(today.getMonth() + 1).padStart(2, '0') + '/' + String(today.getDate()).padStart(2, '0');

  var filteredSlots = getFilteredSlots();
  var lessonDates = {};
  filteredSlots.forEach(function(s) { lessonDates[s.date] = true; });

  var html = '';

  // Empty cells for offset
  for (var i = 0; i < startOffset; i++) {
    html += '<div class="calendar-day empty"></div>';
  }

  for (var d = 1; d <= daysInMonth; d++) {
    var dateStr = year + '/' + String(month + 1).padStart(2, '0') + '/' + String(d).padStart(2, '0');
    var hasRegular = getRegularLessonsForDate(dateStr).length > 0;
    var classes = ['calendar-day'];
    if (dateStr === todayStr) classes.push('today');
    if (dateStr === selectedDate) classes.push('selected');
    if (lessonDates[dateStr]) classes.push('has-lessons');
    if (hasRegular) classes.push('has-regular');

    html += '<div class="' + classes.join(' ') + '" onclick="selectDate(\'' + dateStr + '\')">';
    html += '<span class="day-number">' + d + '</span>';
    if (lessonDates[dateStr] || hasRegular) html += '<span class="day-dot"></span>';
    html += '</div>';
  }

  grid.innerHTML = html;

  // Re-render lessons if a date is selected
  if (selectedDate) {
    renderDayLessons(selectedDate);
  }
}

function selectDate(dateStr) {
  selectedDate = dateStr;
  renderCalendar();
  renderDayLessons(dateStr);

  // Smooth scroll to lessons on mobile
  var lessonsEl = document.getElementById('day-lessons');
  if (lessonsEl && window.innerWidth <= 768) {
    setTimeout(function() {
      lessonsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }
}

function changeMonth(delta) {
  currentMonth.setMonth(currentMonth.getMonth() + delta);
  selectedDate = null;
  document.getElementById('day-lessons').innerHTML = '';
  renderCalendar();
}

function getSlotMembers(slot) {
  // API mode: members are included in slot data from GAS
  if (!DEMO_MODE) {
    return slot.members || [];
  }

  // Demo mode: generate from demo data
  var members = [];
  var names = ['田中さくら','鈴木はると','佐藤ゆい','山田れん','高橋あおい','伊藤そら','渡辺ひなた','中村みお'];
  var baseSlot = demoSlots.find(function(s) {
    return s.date === slot.date && s.studio === slot.studio && s.time === slot.time;
  });
  if (baseSlot) {
    for (var i = 0; i < baseSlot.booked; i++) {
      members.push({ name: names[i % names.length], booked_at: '03/18 10:' + String(10 + i * 5).padStart(2, '0') });
    }
  }

  demoBookings.filter(function(b) {
    return b.date === slot.date && b.studio === slot.studio && b.time === slot.time;
  }).forEach(function(b) {
    members.push({
      name: b.name,
      booked_at: new Date(b.bookedAt).toLocaleString('ja-JP', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})
    });
  });

  return members;
}

function renderDayLessons(dateStr) {
  var container = document.getElementById('day-lessons');
  var slots = getFilteredSlots().filter(function(s) { return s.date === dateStr; });
  var regulars = getRegularLessonsForDate(dateStr);

  var parts = dateStr.split('/');
  var dateObj = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
  var days = ['日', '月', '火', '水', '木', '金', '土'];
  var dateLabel = parseInt(parts[1]) + '/' + parseInt(parts[2]) + '（' + days[dateObj.getDay()] + '）';

  if (slots.length === 0 && regulars.length === 0) {
    container.innerHTML =
      '<div class="day-lessons-header">' + escapeHtml(dateLabel) + '</div>' +
      '<div class="day-lessons-empty">この日のレッスンはありません</div>';
    return;
  }

  var html = '<div class="day-lessons-header">' + escapeHtml(dateLabel) + ' のレッスン</div>';
  html += '<div class="day-lessons-grid">';

  // Regular lessons first
  regulars.forEach(function(r) {
    html += '<div class="slot-card regular-lesson">';
    html += '<div class="slot-card-info">';
    html += '<span class="regular-lesson-badge">定期レッスン</span>';
    if (r.studio) html += '<span class="slot-tag studio">' + escapeHtml(r.studio) + '</span>';
    html += '<span class="slot-tag time">' + escapeHtml(r.time || '') + '</span>';
    html += '<span class="slot-tag">' + escapeHtml(r.class_name || '') + '</span>';
    html += '</div>';
    html += '</div>';
  });

  slots.forEach(function(slot) {
    var isUnlimited = slot.max === 0 || slot.max === '0';
    var available = isUnlimited ? 999 : (slot.available || 0);
    var spotClass = isUnlimited ? '' : (available <= 0 ? 'full' : available <= 2 ? 'few' : '');

    html += '<div class="slot-card">';
    html += '<div class="slot-card-info">';
    html += '<span class="slot-tag studio">' + escapeHtml(slot.studio || '') + '</span>';
    html += '<span class="slot-tag time">' + escapeHtml(slot.time || '') + '</span>';
    html += '<span class="slot-tag">' + escapeHtml(slot.class_name || '') + '</span>';
    html += '</div>';
    html += '<div class="slot-availability">';
    if (isUnlimited) {
      html += '<span class="slot-spots" style="color:var(--coral)">予約受付中</span>';
    } else {
      html += '<span class="slot-spots ' + spotClass + '">残り <strong>' + available + '</strong> 枠</span>';
    }

    if (isAdminMode) {
      html += '<button class="admin-delete-btn" onclick=\'adminDeleteSlot(' +
        JSON.stringify({date:slot.date,studio:slot.studio,time:slot.time}).replace(/'/g, "\\'") + ')\'>削除</button>';
    } else if (available > 0) {
      html += '<button class="slot-book-btn" onclick=\'openBookingModal(' +
        JSON.stringify(slot).replace(/'/g, "\\'") + ')\'>予約する</button>';
    } else {
      html += '<button class="slot-book-btn" disabled>満員</button>';
    }

    html += '</div>';

    // Show booked members
    var members = getSlotMembers(slot);
    if (members.length > 0) {
      html += '<div style="margin-top:0.8rem;padding-top:0.8rem;border-top:1px solid var(--gray-100)">';
      var capLabel = isUnlimited ? '無制限' : ((slot.max || 10) + '名');
      html += '<div style="font-size:0.8rem;font-weight:500;color:var(--gray-500);margin-bottom:0.4rem;">予約者 (' + members.length + '/' + capLabel + ')</div>';
      members.forEach(function(m) {
        html += '<div class="bklist-member">';
        html += '<div class="bklist-member-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>';
        html += '<span class="bklist-member-name">' + escapeHtml(m.name) + '</span>';
        if (m.booked_at) html += '<span class="bklist-member-time">' + escapeHtml(m.booked_at) + '</span>';
        if (isAdminMode) {
          html += '<button class="admin-cancel-btn" title="予約キャンセル" onclick=\'adminCancelBooking(' +
            JSON.stringify({date:slot.date,studio:slot.studio,time:slot.time,name:m.name}).replace(/'/g, "\\'") +
            ')\'>&times;</button>';
        }
        html += '</div>';
      });
      html += '</div>';
    }

    html += '</div>';
  });

  html += '</div>';
  container.innerHTML = html;
}

// ===== BOOKING MODAL =====
var currentBookingSlot = null;

function initBookingModal() {
  document.getElementById('booking-modal').addEventListener('click', function(e) {
    if (e.target === this) closeBookingModal();
  });

  document.getElementById('booking-form').addEventListener('submit', function(e) {
    e.preventDefault();
    submitBooking();
  });
}

function openBookingModal(slot) {
  currentBookingSlot = slot;
  var modal = document.getElementById('booking-modal');

  var slotHtml =
    '<span class="slot-tag">' + escapeHtml(slot.date || '') + '</span>' +
    '<span class="slot-tag studio">' + escapeHtml(slot.studio || '') + '</span>' +
    '<span class="slot-tag time">' + escapeHtml(slot.time || '') + '</span>' +
    '<span class="slot-tag">' + escapeHtml(slot.class_name || '') + '</span>';

  document.getElementById('booking-modal-body').innerHTML =
    '<h3>レッスン予約</h3>' +
    '<p class="booking-modal-sub">以下のレッスンを予約します</p>' +
    '<div class="booking-modal-slot">' + slotHtml + '</div>' +
    '<form id="booking-form" onsubmit="event.preventDefault();submitBooking()">' +
      '<div class="booking-field">' +
        '<label>お名前 <span class="required-mark" style="color:' + (currentCategory === 'future' ? 'var(--navy)' : 'var(--coral)') + '">*</span></label>' +
        '<input type="text" id="booking-name" required placeholder="山田 太郎" autocomplete="name">' +
      '</div>' +
      '<div class="booking-field">' +
        '<label>メールアドレス</label>' +
        '<input type="email" id="booking-email" placeholder="example@gmail.com" autocomplete="email">' +
        '<span style="font-size:0.75rem;color:var(--gray-500);margin-top:4px;display:block;">予約確認メールをお送りします</span>' +
      '</div>' +
      '<div class="booking-modal-actions">' +
        '<button type="button" class="booking-cancel-btn" onclick="closeBookingModal()">キャンセル</button>' +
        '<button type="submit" class="booking-submit-btn" id="booking-submit-btn">予約する</button>' +
      '</div>' +
    '</form>';

  modal.classList.remove('modal-future');
  if (currentCategory === 'future') modal.classList.add('modal-future');
  modal.classList.add('active');

  // Restore saved name/email from localStorage
  try {
    var savedName = localStorage.getItem('btm_booking_name');
    var savedEmail = localStorage.getItem('btm_booking_email');
    if (savedName) document.getElementById('booking-name').value = savedName;
    if (savedEmail) document.getElementById('booking-email').value = savedEmail;
  } catch(e) {}
}

function closeBookingModal() {
  document.getElementById('booking-modal').classList.remove('active');
  currentBookingSlot = null;
}

function submitBooking() {
  if (!currentBookingSlot) return;

  var name = document.getElementById('booking-name').value.trim();
  var emailEl = document.getElementById('booking-email');
  var email = emailEl ? emailEl.value.trim() : '';

  if (!name) {
    document.getElementById('booking-name').focus();
    return;
  }

  // Save name/email to localStorage for next time
  try { localStorage.setItem('btm_booking_name', name); } catch(e) {}
  if (email) { try { localStorage.setItem('btm_booking_email', email); } catch(e) {} }

  var btn = document.getElementById('booking-submit-btn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  if (DEMO_MODE) {
    setTimeout(function() {
      demoBookings.push({
        date: currentBookingSlot.date,
        studio: currentBookingSlot.studio,
        time: currentBookingSlot.time,
        class_name: currentBookingSlot.class_name,
        name: name,
        bookedAt: new Date().toISOString()
      });
      sessionStorage.setItem('btm_demo_bookings', JSON.stringify(demoBookings));
      showBookingSuccess(name);
    }, 800);
    return;
  }

  var params = new URLSearchParams({
    action: 'book',
    date: currentBookingSlot.date || '',
    studio: currentBookingSlot.studio || '',
    time: currentBookingSlot.time || '',
    class_name: currentBookingSlot.class_name || '',
    name: name, email: email
  });

  fetch(APPS_SCRIPT_URL + '?' + params.toString(), { redirect: 'follow' })
    .then(function(r) { return r.json(); })
    .then(function(result) {
      if (result.success) { showBookingSuccess(name); }
      else { btn.disabled = false; btn.textContent = '予約する'; alert(result.error || '予約に失敗しました'); }
    })
    .catch(function() { btn.disabled = false; btn.textContent = '予約する'; alert('通信エラーが発生しました'); });
}

function showBookingSuccess(name) {
  var body = document.getElementById('booking-modal-body');
  body.innerHTML =
    '<div class="booking-success">' +
      '<div class="booking-success-icon">&#10003;</div>' +
      '<h4>予約完了！</h4>' +
      '<p>' + escapeHtml(name) + ' さんの予約を受け付けました</p>' +
      '<br>' +
      '<button class="slot-book-btn" onclick="closeBookingModal();renderCalendar();if(selectedDate)renderDayLessons(selectedDate);">閉じる</button>' +
    '</div>';
}

// ===== ANNOUNCEMENTS =====
function fetchAnnouncements() {
  var container = document.getElementById('announcements-content');

  if (DEMO_MODE) {
    var html = '';
    for (var i = demoAnnouncements.length - 1; i >= 0; i--) {
      var a = demoAnnouncements[i];
      var isImportant = a.importance === '重要';
      var cardClass = isImportant ? 'announce-card important' : 'announce-card';
      html += '<div class="' + cardClass + '">';
      html += '<div class="announce-card-header">';
      html += '<span class="announce-date">' + escapeHtml(a.date) + '</span>';
      if (isImportant) html += '<span class="announce-badge-important">重要</span>';
      html += '</div>';
      html += '<h4>' + escapeHtml(a.title) + '</h4>';
      html += '<p>' + escapeHtml(a.content) + '</p>';
      html += '</div>';
    }
    container.innerHTML = html;
    return;
  }

  if (!APPS_SCRIPT_URL) {
    showAnnounceEmpty(container);
    return;
  }

  container.innerHTML = '<div class="loading-container"><div class="spinner"></div><span class="loading-text">お知らせを読み込み中...</span></div>';

  fetch(APPS_SCRIPT_URL + '?action=announcements', { redirect: 'follow' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data || data.length === 0) { showAnnounceEmpty(container); return; }
      var html = '';
      for (var i = data.length - 1; i >= 0; i--) {
        var a = data[i];
        var isImportant = (a.importance || '').indexOf('重要') !== -1;
        html += '<div class="' + (isImportant ? 'announce-card important' : 'announce-card') + '">';
        html += '<div class="announce-card-header">';
        html += '<span class="announce-date">' + escapeHtml(a.date || '') + '</span>';
        if (isImportant) html += '<span class="announce-badge-important">重要</span>';
        html += '</div>';
        html += '<h4>' + escapeHtml(a.title || '') + '</h4>';
        html += '<p>' + escapeHtml(a.content || '') + '</p>';
        html += '</div>';
      }
      container.innerHTML = html;
    })
    .catch(function() { showAnnounceEmpty(container); });
}

function showAnnounceEmpty(container) {
  container.innerHTML =
    '<div class="announcement-empty"><div class="announcement-empty-icon">' +
    '<svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>' +
    '</div><p class="announcement-empty-text">お知らせはまだありません</p></div>';
}

function toggleUnlimited(mode) {
  var cbId = mode === 'single' ? 'admin-slot-unlimited' : 'admin-bulk-unlimited';
  var numId = mode === 'single' ? 'admin-slot-max' : 'admin-bulk-max';
  var cb = document.getElementById(cbId);
  var num = document.getElementById(numId);
  if (cb && num) {
    num.disabled = cb.checked;
    if (cb.checked) num.style.opacity = '0.4';
    else num.style.opacity = '1';
  }
}

function switchSlotMode(mode) {
  adminSlotMode = mode;
  var singleForm = document.getElementById('admin-single-form');
  var bulkForm = document.getElementById('admin-bulk-form');
  if (singleForm) singleForm.style.display = mode === 'single' ? 'block' : 'none';
  if (bulkForm) bulkForm.style.display = mode === 'bulk' ? 'block' : 'none';

  var toggleBtns = document.querySelectorAll('.admin-mode-toggle button');
  toggleBtns.forEach(function(btn, i) {
    btn.classList.toggle('active', (i === 0 && mode === 'single') || (i === 1 && mode === 'bulk'));
  });
}

function toggleDow(btn) {
  btn.classList.toggle('selected');
  updateBulkPreview();
}

function getSelectedDows() {
  var btns = document.querySelectorAll('.admin-dow-btn.selected');
  var dows = [];
  btns.forEach(function(b) { dows.push(parseInt(b.getAttribute('data-dow'))); });
  return dows; // 0=月, 1=火, ..., 6=日
}

function getBulkDates() {
  var startEl = document.getElementById('admin-bulk-start');
  var endEl = document.getElementById('admin-bulk-end');
  if (!startEl || !endEl) return [];

  var start = new Date(startEl.value);
  var end = new Date(endEl.value);
  if (isNaN(start.getTime()) || isNaN(end.getTime()) || start > end) return [];

  var dows = getSelectedDows();
  if (dows.length === 0) return [];

  // Convert our dow (0=月..6=日) to JS dow (0=日,1=月..6=土)
  var jsDowMap = [1, 2, 3, 4, 5, 6, 0]; // 月=1, 火=2, ..., 日=0
  var targetJsDows = dows.map(function(d) { return jsDowMap[d]; });

  var dates = [];
  var cur = new Date(start);
  while (cur <= end) {
    if (targetJsDows.indexOf(cur.getDay()) !== -1) {
      dates.push(new Date(cur));
    }
    cur.setDate(cur.getDate() + 1);
  }
  return dates;
}

function updateBulkPreview() {
  var previewEl = document.getElementById('admin-bulk-preview');
  if (!previewEl) return;

  var dates = getBulkDates();
  if (dates.length === 0) {
    previewEl.innerHTML = '曜日を選んで日程を確認';
    return;
  }

  var dowNames = ['日','月','火','水','木','金','土'];
  var list = dates.map(function(d) {
    return (d.getMonth()+1) + '/' + d.getDate() + '(' + dowNames[d.getDay()] + ')';
  }).join('、');

  previewEl.innerHTML = '<strong>' + dates.length + '件</strong>追加されます：' + list;
}

function adminAddSlot() {
  var date = document.getElementById('admin-slot-date').value;
  var studio = document.getElementById('admin-slot-studio').value;
  var tStart = document.getElementById('admin-slot-time-start').value;
  var tEnd = document.getElementById('admin-slot-time-end').value;
  var time = tStart && tEnd ? tStart + '〜' + tEnd : '';
  var className = document.getElementById('admin-slot-class').value.trim();
  var unlimited = document.getElementById('admin-slot-unlimited').checked;
  var max = unlimited ? 0 : (parseInt(document.getElementById('admin-slot-max').value) || 8);
  var category = currentCategory.toUpperCase();

  if (!date || !studio || !tStart || !tEnd || !className) {
    alert('すべての項目を入力してください');
    return;
  }

  var dateStr = date.replace(/-/g, '/');
  var avail = unlimited ? 999 : max;

  if (DEMO_MODE) {
    demoAdminSlots.push({ date: dateStr, studio: studio, time: time, class_name: className, max: max, booked: 0, available: avail, category: category });
    sessionStorage.setItem('btm_demo_admin_slots', JSON.stringify(demoAdminSlots));
    alert('追加しました');
    renderCalendar();
    return;
  }

  var params = new URLSearchParams({
    action: 'addSlot', adminKey: ADMIN_PASSWORD,
    date: dateStr, studio: studio, time: time, class_name: className, max: max, category: category
  });
  apiCall(params, function() { alert('追加しました'); fetchSlotsFromAPI(function() { renderCalendar(); }); });
}

function adminBulkAddSlots() {
  var dates = getBulkDates();
  if (dates.length === 0) {
    alert('曜日と期間を設定してください');
    return;
  }

  var studio = document.getElementById('admin-bulk-studio').value;
  var tStart = document.getElementById('admin-bulk-time-start').value;
  var tEnd = document.getElementById('admin-bulk-time-end').value;
  var time = tStart && tEnd ? tStart + '〜' + tEnd : '';
  var className = document.getElementById('admin-bulk-class').value.trim();
  var unlimited = document.getElementById('admin-bulk-unlimited').checked;
  var max = unlimited ? 0 : (parseInt(document.getElementById('admin-bulk-max').value) || 8);
  var category = currentCategory.toUpperCase();

  if (!studio || !tStart || !tEnd || !className) {
    alert('スタジオ・時間・クラス名を入力してください');
    return;
  }

  if (!confirm(dates.length + '件のレッスン枠を追加しますか？')) return;

  var avail = unlimited ? 999 : max;

  if (DEMO_MODE) {
    dates.forEach(function(d) {
      var dateStr = d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
      demoAdminSlots.push({ date: dateStr, studio: studio, time: time, class_name: className, max: max, booked: 0, available: avail, category: category });
    });
    sessionStorage.setItem('btm_demo_admin_slots', JSON.stringify(demoAdminSlots));
    alert(dates.length + '件追加しました');
    renderCalendar();
    return;
  }

  // Real mode: sequential API calls
  var i = 0;
  function addNext() {
    if (i >= dates.length) {
      alert(dates.length + '件追加しました');
      fetchSlotsFromAPI(function() { renderCalendar(); });
      return;
    }
    var d = dates[i];
    var dateStr = d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
    var params = new URLSearchParams({
      action: 'addSlot', adminKey: ADMIN_PASSWORD,
      date: dateStr, studio: studio, time: time, class_name: className, max: max, category: category
    });
    i++;
    apiCall(params, addNext);
  }
  addNext();
}

function adminDeleteSlot(slot) {
  if (!confirm(slot.date + ' ' + slot.studio + ' ' + slot.time + ' を削除しますか？')) return;

  if (DEMO_MODE) {
    demoDeletedSlots.push({ date: slot.date, studio: slot.studio, time: slot.time });
    sessionStorage.setItem('btm_demo_deleted_slots', JSON.stringify(demoDeletedSlots));
    renderCalendar();
    if (selectedDate) renderDayLessons(selectedDate);
    return;
  }

  var params = new URLSearchParams({
    action: 'deleteSlot', adminKey: ADMIN_PASSWORD,
    date: slot.date, studio: slot.studio, time: slot.time
  });
  apiCall(params, function() { fetchSlotsFromAPI(function() { renderCalendar(); if (selectedDate) renderDayLessons(selectedDate); }); });
}

function adminCancelBooking(info) {
  if (!confirm(info.name + ' さんの予約をキャンセルしますか？')) return;

  if (DEMO_MODE) {
    demoBookings = demoBookings.filter(function(b) {
      return !(b.date === info.date && b.studio === info.studio && b.time === info.time && b.name === info.name);
    });
    sessionStorage.setItem('btm_demo_bookings', JSON.stringify(demoBookings));
    renderCalendar();
    if (selectedDate) renderDayLessons(selectedDate);
    return;
  }

  var params = new URLSearchParams({
    action: 'cancelBooking', adminKey: ADMIN_PASSWORD,
    date: info.date, studio: info.studio, time: info.time, name: info.name
  });
  apiCall(params, function() { fetchSlotsFromAPI(function() { renderCalendar(); if (selectedDate) renderDayLessons(selectedDate); }); });
}

function fetchAdminAnnouncements() {
  var container = document.getElementById('admin-announce-list');
  if (!container) return;

  if (DEMO_MODE) {
    renderAdminAnnouncements(demoAnnouncements, container);
    return;
  }

  if (!APPS_SCRIPT_URL) {
    renderAdminAnnouncements([], container);
    return;
  }

  container.innerHTML = '<div class="loading-container"><div class="spinner"></div><span class="loading-text">読み込み中...</span></div>';
  fetch(APPS_SCRIPT_URL + '?action=announcements', { redirect: 'follow' })
    .then(function(r) { return r.json(); })
    .then(function(data) { renderAdminAnnouncements(data, container); })
    .catch(function() { renderAdminAnnouncements([], container); });
}

function renderAdminAnnouncements(items, container) {
  if (!items || items.length === 0) {
    container.innerHTML = '<div class="day-lessons-empty">お知らせはまだありません</div>';
    return;
  }
  var html = '';
  for (var i = items.length - 1; i >= 0; i--) {
    var a = items[i];
    var isImportant = (a.importance || '').indexOf('重要') !== -1;
    html += '<div class="' + (isImportant ? 'announce-card important' : 'announce-card') + '" style="position:relative">';
    html += '<div class="announce-card-header">';
    html += '<span class="announce-date">' + escapeHtml(a.date || '') + '</span>';
    if (isImportant) html += '<span class="announce-badge-important">重要</span>';
    html += '</div>';
    html += '<h4>' + escapeHtml(a.title || '') + '</h4>';
    html += '<p>' + escapeHtml(a.content || '') + '</p>';
    html += '<button class="admin-delete-btn" style="margin-top:0.8rem" onclick=\'adminDeleteAnnouncement(' +
      (a.row ? a.row : i) + ',' + JSON.stringify(a.title||'').replace(/'/g, "\\'") + ')\'">削除</button>';
    html += '</div>';
  }
  container.innerHTML = html;
}

function adminAddAnnouncement() {
  var dateInput = document.getElementById('admin-announce-date').value;
  var title = document.getElementById('admin-announce-title').value.trim();
  var content = document.getElementById('admin-announce-content').value.trim();
  var importance = document.getElementById('admin-announce-importance').value;

  if (!title) { alert('タイトルを入力してください'); return; }

  var dateStr = dateInput ? dateInput.replace(/-/g, '/') : '';

  if (DEMO_MODE) {
    demoAnnouncements.push({ date: dateStr, title: title, content: content, importance: importance });
    document.getElementById('admin-announce-title').value = '';
    document.getElementById('admin-announce-content').value = '';
    document.getElementById('admin-announce-importance').value = '';
    fetchAdminAnnouncements();
    alert('追加しました');
    return;
  }

  var params = new URLSearchParams({
    action: 'addAnnouncement', adminKey: ADMIN_PASSWORD,
    date: dateStr, title: title, content: content, importance: importance
  });
  apiCall(params, function() {
    document.getElementById('admin-announce-title').value = '';
    document.getElementById('admin-announce-content').value = '';
    alert('追加しました');
    fetchAdminAnnouncements();
  });
}

function adminDeleteAnnouncement(rowOrIndex, title) {
  if (!confirm('「' + title + '」を削除しますか？')) return;

  if (DEMO_MODE) {
    demoAnnouncements.splice(rowOrIndex, 1);
    fetchAdminAnnouncements();
    return;
  }

  var params = new URLSearchParams({ action: 'deleteAnnouncement', adminKey: ADMIN_PASSWORD, row: rowOrIndex });
  apiCall(params, function() { fetchAdminAnnouncements(); });
}

// ===== ADMIN: REGULAR LESSONS =====
function fetchAdminRegularLessons() {
  var container = document.getElementById('admin-regular-list');
  if (!container) return;

  if (!APPS_SCRIPT_URL) {
    container.innerHTML = '<div class="day-lessons-empty">定期レッスンはまだありません</div>';
    return;
  }

  container.innerHTML = '<div class="loading-container"><div class="spinner"></div><span class="loading-text">読み込み中...</span></div>';
  fetch(APPS_SCRIPT_URL + '?action=regularLessons', { redirect: 'follow' })
    .then(function(r) { return r.json(); })
    .then(function(data) { renderAdminRegularLessons(data, container); })
    .catch(function() { container.innerHTML = '<div class="day-lessons-empty">定期レッスンはまだありません</div>'; });
}

function renderAdminRegularLessons(items, container) {
  if (!items || items.length === 0) {
    container.innerHTML = '<div class="day-lessons-empty">定期レッスンはまだありません</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < items.length; i++) {
    var r = items[i];
    var catClass = (r.category || '').toUpperCase() === 'FUTURE' ? 'navy' : 'coral';
    html += '<div class="slot-card regular-lesson" style="position:relative">';
    html += '<div class="slot-card-info">';
    html += '<span class="regular-lesson-badge" style="background:var(--' + catClass + ')">' + escapeHtml(r.category || 'KIDS') + '</span>';
    html += '<span class="slot-tag" style="font-weight:600">毎週' + escapeHtml(r.dayOfWeek || '') + '曜</span>';
    if (r.studio) html += '<span class="slot-tag studio">' + escapeHtml(r.studio) + '</span>';
    if (r.time) html += '<span class="slot-tag time">' + escapeHtml(r.time) + '</span>';
    html += '<span class="slot-tag">' + escapeHtml(r.class_name || '') + '</span>';
    html += '</div>';
    html += '<button class="admin-delete-btn" style="margin-top:0.5rem" onclick=\'adminDeleteRegularLesson(' +
      (r.row ? r.row : (i + 2)) + ')\'>削除</button>';
    html += '</div>';
  }
  container.innerHTML = html;
}

function adminAddRegularLesson() {
  var dow = document.getElementById('admin-regular-dow').value;
  var studio = document.getElementById('admin-regular-studio').value;
  var time = document.getElementById('admin-regular-time').value.trim();
  var className = document.getElementById('admin-regular-class').value.trim();
  var category = document.getElementById('admin-regular-category').value;

  if (!dow || !className) { alert('曜日とクラス名を入力してください'); return; }

  var params = new URLSearchParams({
    action: 'addRegularLesson', adminKey: ADMIN_PASSWORD,
    dayOfWeek: dow, studio: studio, time: time, class_name: className, category: category
  });

  apiCall(params, function() {
    document.getElementById('admin-regular-class').value = '';
    document.getElementById('admin-regular-time').value = '';
    fetchAdminRegularLessons();
    // Also refresh calendar regular lessons
    fetchRegularLessons(function() { renderCalendar(); });
  });
}

function adminDeleteRegularLesson(row) {
  if (!confirm('この定期レッスンを削除しますか？')) return;

  var params = new URLSearchParams({
    action: 'deleteRegularLesson', adminKey: ADMIN_PASSWORD, row: row
  });

  apiCall(params, function() {
    fetchAdminRegularLessons();
    fetchRegularLessons(function() { renderCalendar(); });
  });
}

function apiCall(params, onSuccess) {
  fetch(APPS_SCRIPT_URL + '?' + params.toString(), { redirect: 'follow' })
    .then(function(r) { return r.json(); })
    .then(function(result) {
      if (result.success) { if (onSuccess) onSuccess(result); }
      else { alert(result.error || 'エラーが発生しました'); }
    })
    .catch(function(e) { alert('通信エラー: ' + e.message); });
}

// ===== UTILITIES =====
function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}
</script>
