<script>
(function() {
  'use strict';

  // ===== CONFIGURATION =====
  const SPREADSHEET_ID = 'YOUR_SPREADSHEET_ID_HERE';
  const NEWS_SHEET = 'FUTUREニュース'; // Sheet name
  // =========================

  // ===== GOLD PARTICLE SYSTEM =====
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let animId;
  let w, h;

  function resizeCanvas() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }

  class Particle {
    constructor() {
      this.reset();
    }
    reset() {
      this.x = Math.random() * w;
      this.y = Math.random() * h;
      this.size = Math.random() * 1.8 + 0.3;
      this.speedX = (Math.random() - 0.5) * 0.2;
      this.speedY = Math.random() * -0.3 - 0.05;
      this.opacity = Math.random() * 0.35 + 0.05;
      this.fadeSpeed = Math.random() * 0.002 + 0.001;
      this.phase = Math.random() * Math.PI * 2;
      this.wobble = Math.random() * 0.4 + 0.1;
    }
    update() {
      this.x += this.speedX + Math.sin(this.phase) * this.wobble * 0.015;
      this.y += this.speedY;
      this.phase += 0.015;
      this.opacity += Math.sin(this.phase * 2) * this.fadeSpeed;
      if (this.opacity <= 0 || this.y < -10 || this.x < -10 || this.x > w + 10) {
        this.reset();
        this.y = h + 10;
        this.opacity = 0;
      }
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(212, 168, 83, ' + Math.max(0, Math.min(this.opacity, 0.4)) + ')';
      ctx.fill();
    }
  }

  function initParticles() {
    resizeCanvas();
    var count = Math.min(Math.floor(w * h / 25000), 40);
    particles = [];
    for (var i = 0; i < count; i++) {
      particles.push(new Particle());
    }
  }

  function animateParticles() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(function(p) {
      p.update();
      p.draw();
    });
    animId = requestAnimationFrame(animateParticles);
  }

  initParticles();
  animateParticles();

  var resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {
      resizeCanvas();
      initParticles();
    }, 200);
  });

  // Pause when tab not visible
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      cancelAnimationFrame(animId);
      animId = null;
    } else {
      if (!animId) animateParticles();
    }
  });

  // ===== NAV SCROLL =====
  var nav = document.getElementById('nav');
  window.addEventListener('scroll', function() {
    if (window.scrollY > 60) {
      nav.classList.add('scrolled');
    } else {
      nav.classList.remove('scrolled');
    }
  }, { passive: true });

  // ===== BACK TO TOP =====
  var backToTop = document.getElementById('backToTop');

  window.addEventListener('scroll', function() {
    if (window.scrollY > 500) {
      backToTop.classList.add('show');
    } else {
      backToTop.classList.remove('show');
    }
  }, { passive: true });

  backToTop.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // ===== CATEGORY HELPERS =====
  function getCategoryClass(category) {
    if (!category) return '';
    var cat = category.trim();
    if (cat === 'イベント') return 'cat-event';
    if (cat === 'お知らせ') return 'cat-info';
    if (cat === 'レッスン') return 'cat-lesson';
    return 'cat-other';
  }

  // ===== DATE FORMATTING =====
  function formatDate(dateStr) {
    if (!dateStr) return '';
    // Try to parse various date formats
    var d = new Date(dateStr);
    if (isNaN(d.getTime())) {
      // Try Japanese-style: 2025/1/15 or 2025-01-15
      return dateStr;
    }
    var year = d.getFullYear();
    var month = d.getMonth() + 1;
    var day = d.getDate();
    return year + '.' + (month < 10 ? '0' : '') + month + '.' + (day < 10 ? '0' : '') + day;
  }

  // ===== SCROLL REVEAL FOR CARDS =====
  function observeCards() {
    var items = document.querySelectorAll('.news-card, .card-divider');
    if (!items.length) return;

    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          // Stagger delay based on index
          var delay = 0;
          var el = entry.target;
          var cards = document.querySelectorAll('.news-card, .card-divider');
          for (var i = 0; i < cards.length; i++) {
            if (cards[i] === el) {
              delay = (i % 3) * 100;
              break;
            }
          }
          setTimeout(function() {
            el.classList.add('visible');
          }, delay);
          observer.unobserve(el);
        }
      });
    }, {
      threshold: 0.08,
      rootMargin: '0px 0px -30px 0px'
    });

    items.forEach(function(item) {
      observer.observe(item);
    });
  }

  // ===== RENDER NEWS =====
  function renderNews(posts) {
    var container = document.getElementById('newsContainer');

    if (!posts || posts.length === 0) {
      container.innerHTML =
        '<div class="empty-state">' +
          '<div class="empty-state-icon">' +
            '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">' +
              '<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>' +
              '<polyline points="14 2 14 8 20 8"/>' +
              '<line x1="16" y1="13" x2="8" y2="13"/>' +
              '<line x1="16" y1="17" x2="8" y2="17"/>' +
              '<polyline points="10 9 9 9 8 9"/>' +
            '</svg>' +
          '</div>' +
          '<h3>NO NEWS YET</h3>' +
          '<p>現在、お知らせはありません</p>' +
        '</div>';
      return;
    }

    // Sort newest first by date
    posts.sort(function(a, b) {
      var da = new Date(a.date);
      var db = new Date(b.date);
      if (isNaN(da.getTime()) || isNaN(db.getTime())) {
        return (b.date || '').localeCompare(a.date || '');
      }
      return db - da;
    });

    var html = '';
    posts.forEach(function(post, index) {
      // Divider between cards
      if (index > 0) {
        html +=
          '<div class="card-divider">' +
            '<div class="div-line"></div>' +
            '<div class="div-dot"></div>' +
            '<div class="div-line"></div>' +
          '</div>';
      }

      // Category badge
      var categoryHtml = '';
      if (post.category && post.category.trim()) {
        var catClass = getCategoryClass(post.category);
        categoryHtml = '<span class="news-category ' + catClass + '">' + escapeHtml(post.category.trim()) + '</span>';
      }

      // Image
      var imageHtml = '';
      if (post.imageUrl && post.imageUrl.trim()) {
        imageHtml =
          '<div class="news-image">' +
            '<img src="' + escapeHtml(post.imageUrl.trim()) + '" alt="' + escapeHtml(post.title || '') + '" loading="lazy" onerror="this.parentElement.style.display=\'none\'">' +
          '</div>';
      }

      // Content with line break support
      var content = post.content || '';

      html +=
        '<article class="news-card">' +
          '<div class="news-card-header">' +
            '<time class="news-date">' + escapeHtml(formatDate(post.date)) + '</time>' +
            categoryHtml +
          '</div>' +
          '<h2 class="news-title">' + escapeHtml(post.title || '') + '</h2>' +
          '<div class="news-body">' + escapeHtml(content) + '</div>' +
          imageHtml +
        '</article>';
    });

    container.innerHTML = html;

    // Trigger scroll reveal
    requestAnimationFrame(function() {
      observeCards();
    });
  }

  // ===== ESCAPE HTML =====
  function escapeHtml(str) {
    if (!str) return '';
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ===== SHOW SETUP MESSAGE =====
  function showSetup() {
    var container = document.getElementById('newsContainer');
    container.innerHTML =
      '<div class="setup-message">' +
        '<div class="setup-message-icon">' +
          '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">' +
            '<path d="M12 20h9"/>' +
            '<path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>' +
          '</svg>' +
        '</div>' +
        '<h3>SETUP REQUIRED</h3>' +
        '<p>Google Spreadsheet と連携するには、HTMLファイル内の設定を変更してください。</p>' +
        '<p style="margin-top:16px;">' +
          '<code>SPREADSHEET_ID</code> にスプレッドシートのIDを設定<br>' +
          'シート名: <code>' + escapeHtml(NEWS_SHEET) + '</code><br><br>' +
          '列構成: <code>日付</code> | <code>タイトル</code> | <code>内容</code> | <code>カテゴリ</code> | <code>画像URL</code>' +
        '</p>' +
      '</div>';
  }

  // ===== SHOW ERROR =====
  function showError(msg) {
    var container = document.getElementById('newsContainer');
    container.innerHTML =
      '<div class="error-state">' +
        '<h3>LOADING ERROR</h3>' +
        '<p>' + escapeHtml(msg || 'データの読み込みに失敗しました') + '</p>' +
        '<button class="retry-btn" onclick="location.reload()">RETRY</button>' +
      '</div>';
  }

  // ===== FETCH FROM GOOGLE SHEETS =====
  function fetchNews() {
    if (SPREADSHEET_ID === 'YOUR_SPREADSHEET_ID_HERE') {
      showSetup();
      return;
    }

    var encodedSheet = encodeURIComponent(NEWS_SHEET);
    var url = 'https://docs.google.com/spreadsheets/d/' + SPREADSHEET_ID +
              '/gviz/tq?tqx=out:json&sheet=' + encodedSheet;

    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.timeout = 15000;

    xhr.onload = function() {
      if (xhr.status === 200) {
        try {
          // Parse JSONP response: strip prefix and suffix
          var text = xhr.responseText;
          var startIdx = text.indexOf('{');
          var endIdx = text.lastIndexOf('}');
          if (startIdx === -1 || endIdx === -1) {
            throw new Error('Invalid response format');
          }
          var json = JSON.parse(text.substring(startIdx, endIdx + 1));

          if (!json.table || !json.table.rows) {
            renderNews([]);
            return;
          }

          var rows = json.table.rows;
          var posts = [];

          rows.forEach(function(row) {
            if (!row.c || row.c.length < 2) return;

            var getValue = function(cell) {
              if (!cell) return '';
              if (cell.f) return cell.f; // formatted value
              if (cell.v !== null && cell.v !== undefined) return String(cell.v);
              return '';
            };

            var date = getValue(row.c[0]);
            var title = getValue(row.c[1]);

            // Skip rows without at least date and title
            if (!date && !title) return;

            posts.push({
              date: date,
              title: title,
              content: row.c.length > 2 ? getValue(row.c[2]) : '',
              category: row.c.length > 3 ? getValue(row.c[3]) : '',
              imageUrl: row.c.length > 4 ? getValue(row.c[4]) : ''
            });
          });

          renderNews(posts);

        } catch (e) {
          console.error('Parse error:', e);
          showError('データの解析に失敗しました。スプレッドシートの共有設定を確認してください。');
        }
      } else {
        showError('データの取得に失敗しました (HTTP ' + xhr.status + ')');
      }
    };

    xhr.onerror = function() {
      showError('ネットワークエラーが発生しました。インターネット接続を確認してください。');
    };

    xhr.ontimeout = function() {
      showError('接続がタイムアウトしました。もう一度お試しください。');
    };

    xhr.send();
  }

  // ===== INIT =====
  fetchNews();

})();
</script>

</html>
