<style>
/* ============================================
   RESET & BASE
   ============================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --orange: #FF6B35;
  --coral: #FF4D6D;
  --yellow: #FFD23F;
  --white: #FFFFFF;
  --light-bg: #FFF9F5;
  --dark-text: #2D2D2D;
  --gray-text: #666666;
  --light-gray: #F5F5F5;
  --orange-light: rgba(255, 107, 53, 0.08);
  --coral-light: rgba(255, 77, 109, 0.08);
  --yellow-light: rgba(255, 210, 63, 0.12);
  --shadow-sm: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-md: 0 8px 30px rgba(0,0,0,0.08);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.1);
  --radius: 20px;
  --radius-sm: 12px;
}

html {
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--dark-text);
  background: var(--light-bg);
  line-height: 1.8;
  overflow-x: hidden;
}

/* ============================================
   FIXED NAVIGATION
   ============================================ */
.navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  padding: 0 2rem;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255, 107, 53, 0.1);
  transition: all 0.3s ease;
}

.navbar.scrolled {
  box-shadow: 0 4px 20px rgba(255, 107, 53, 0.1);
}

.nav-left {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.nav-back {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-family: 'Oswald', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  color: var(--orange);
  text-decoration: none;
  transition: all 0.3s ease;
  padding: 0.4rem 0.8rem;
  border-radius: 8px;
}

.nav-back:hover {
  background: var(--orange-light);
  transform: translateX(-3px);
}

.nav-back svg {
  width: 18px;
  height: 18px;
  stroke: var(--orange);
  stroke-width: 2;
  fill: none;
  transition: transform 0.3s ease;
}

.nav-back:hover svg {
  transform: translateX(-3px);
}

.nav-brand {
  font-family: 'Oswald', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--dark-text);
}

.nav-brand span {
  display: inline-block;
  background: linear-gradient(135deg, var(--orange), var(--coral));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 700;
  margin-left: 0.3rem;
}

.nav-badge {
  font-family: 'Oswald', sans-serif;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: var(--white);
  background: linear-gradient(135deg, var(--orange), var(--coral));
  padding: 0.35rem 1rem;
  border-radius: 50px;
}

/* ============================================
   HERO SECTION
   ============================================ */
.hero {
  position: relative;
  padding: 140px 2rem 80px;
  text-align: center;
  overflow: hidden;
  background: linear-gradient(135deg, var(--orange) 0%, var(--coral) 40%, var(--orange) 70%, var(--yellow) 100%);
  background-size: 300% 300%;
  animation: heroGradient 8s ease infinite;
}

@keyframes heroGradient {
  0% { background-position: 0% 50%; }
  25% { background-position: 50% 0%; }
  50% { background-position: 100% 50%; }
  75% { background-position: 50% 100%; }
  100% { background-position: 0% 50%; }
}

/* Floating shapes */
.hero-shapes {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.hero-blob {
  position: absolute;
  border-radius: 50%;
  opacity: 0.15;
  filter: blur(2px);
}

.hero-blob:nth-child(1) {
  width: 280px; height: 280px;
  background: var(--yellow);
  top: -10%; left: -5%;
  animation: blobFloat1 14s ease-in-out infinite;
}
.hero-blob:nth-child(2) {
  width: 180px; height: 180px;
  background: var(--white);
  top: 10%; right: -3%;
  animation: blobFloat2 11s ease-in-out infinite;
}
.hero-blob:nth-child(3) {
  width: 130px; height: 130px;
  background: var(--coral);
  bottom: 5%; left: 15%;
  animation: blobFloat3 9s ease-in-out infinite;
}
.hero-blob:nth-child(4) {
  width: 100px; height: 100px;
  background: var(--yellow);
  bottom: 20%; right: 15%;
  animation: blobFloat1 12s ease-in-out infinite reverse;
}

.hero-dot {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  pointer-events: none;
}
.hero-dot:nth-child(5) { width: 12px; height: 12px; top: 20%; left: 25%; animation: dotPulse 3s ease infinite 0s; }
.hero-dot:nth-child(6) { width: 8px; height: 8px; top: 40%; left: 75%; animation: dotPulse 3s ease infinite 0.5s; }
.hero-dot:nth-child(7) { width: 14px; height: 14px; top: 65%; left: 10%; animation: dotPulse 3s ease infinite 1s; }
.hero-dot:nth-child(8) { width: 10px; height: 10px; top: 30%; right: 20%; animation: dotPulse 3s ease infinite 1.5s; }
.hero-dot:nth-child(9) { width: 6px; height: 6px; bottom: 25%; left: 55%; animation: dotPulse 3s ease infinite 2s; }

@keyframes blobFloat1 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(40px, -30px) scale(1.1); }
  66% { transform: translate(-20px, 20px) scale(0.9); }
}
@keyframes blobFloat2 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(-40px, -40px) scale(1.15); }
}
@keyframes blobFloat3 {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  50% { transform: translate(30px, -20px) rotate(180deg); }
}
@keyframes dotPulse {
  0%, 100% { opacity: 0.2; transform: scale(0.8); }
  50% { opacity: 0.7; transform: scale(1.3); }
}

.hero-content {
  position: relative;
  z-index: 2;
  color: var(--white);
}

.hero-eyebrow {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(0.75rem, 1.2vw, 0.9rem);
  font-weight: 400;
  letter-spacing: 0.4em;
  opacity: 0.85;
  margin-bottom: 0.5rem;
}

.hero-title {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(3.5rem, 12vw, 7rem);
  font-weight: 800;
  letter-spacing: 0.05em;
  line-height: 0.9;
  text-shadow: 0 6px 30px rgba(0,0,0,0.12);
  margin-bottom: 0.3em;
  animation: titleBounce 3s ease-in-out infinite;
}

@keyframes titleBounce {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.015); }
}

.hero-subtitle {
  font-size: clamp(0.9rem, 2vw, 1.2rem);
  font-weight: 400;
  letter-spacing: 0.1em;
  opacity: 0.9;
}

/* ============================================
   BACKGROUND FLOATING DECORATIONS
   ============================================ */
.bg-decorations {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.bg-shape {
  position: absolute;
  border-radius: 50%;
  opacity: 0.04;
}

.bg-shape:nth-child(1) {
  width: 400px; height: 400px;
  background: var(--orange);
  top: 20%; left: -8%;
  animation: bgFloat1 20s ease-in-out infinite;
}
.bg-shape:nth-child(2) {
  width: 300px; height: 300px;
  background: var(--coral);
  top: 50%; right: -6%;
  animation: bgFloat2 25s ease-in-out infinite;
}
.bg-shape:nth-child(3) {
  width: 250px; height: 250px;
  background: var(--yellow);
  bottom: 10%; left: 30%;
  animation: bgFloat1 18s ease-in-out infinite reverse;
}

@keyframes bgFloat1 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(30px, -50px); }
}
@keyframes bgFloat2 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-40px, 30px); }
}

/* ============================================
   MAIN CONTENT
   ============================================ */
.main-content {
  position: relative;
  z-index: 1;
  max-width: 800px;
  margin: 0 auto;
  padding: 60px 1.5rem 100px;
}

/* ============================================
   LOADING SPINNER
   ============================================ */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 2rem;
  gap: 1.5rem;
}

.spinner {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 4px solid var(--orange-light);
  border-top-color: var(--orange);
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  font-size: 0.9rem;
  color: var(--gray-text);
  letter-spacing: 0.05em;
}

/* ============================================
   SETUP INSTRUCTIONS
   ============================================ */
.setup-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 3rem 2.5rem;
  box-shadow: var(--shadow-md);
  border-left: 5px solid var(--orange);
}

.setup-card h2 {
  font-family: 'Oswald', sans-serif;
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--orange);
  margin-bottom: 1rem;
}

.setup-card p {
  color: var(--gray-text);
  margin-bottom: 1rem;
  line-height: 1.9;
}

.setup-card ol {
  padding-left: 1.5rem;
  color: var(--gray-text);
}

.setup-card ol li {
  margin-bottom: 0.8rem;
  line-height: 1.8;
}

.setup-card code {
  display: inline-block;
  background: var(--light-gray);
  color: var(--coral);
  font-size: 0.85rem;
  padding: 0.15rem 0.6rem;
  border-radius: 6px;
  font-family: 'Courier New', monospace;
  word-break: break-all;
}

.setup-card .columns-note {
  background: var(--yellow-light);
  border-radius: var(--radius-sm);
  padding: 1rem 1.5rem;
  margin-top: 1.5rem;
  font-size: 0.85rem;
}

.setup-card .columns-note strong {
  color: var(--dark-text);
}

/* ============================================
   EMPTY STATE
   ============================================ */
.empty-state {
  text-align: center;
  padding: 80px 2rem;
}

.empty-icon {
  font-size: 3.5rem;
  margin-bottom: 1rem;
  opacity: 0.5;
  display: block;
  line-height: 1;
}

.empty-state p {
  font-size: 1.1rem;
  color: var(--gray-text);
  letter-spacing: 0.03em;
}

/* ============================================
   ERROR STATE
   ============================================ */
.error-state {
  text-align: center;
  padding: 60px 2rem;
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow-md);
}

.error-state .error-icon {
  width: 56px;
  height: 56px;
  margin: 0 auto 1.5rem;
  border-radius: 50%;
  background: rgba(255, 77, 109, 0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
}

.error-state p {
  color: var(--gray-text);
  margin-bottom: 0.5rem;
}

.error-state .error-detail {
  font-size: 0.8rem;
  color: #999;
}

.retry-btn {
  display: inline-block;
  margin-top: 1.5rem;
  padding: 0.7rem 2rem;
  background: linear-gradient(135deg, var(--orange), var(--coral));
  color: var(--white);
  border: none;
  border-radius: 50px;
  font-family: 'Oswald', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.3s ease;
}

.retry-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255, 107, 53, 0.3);
}

/* ============================================
   BLOG POST CARDS
   ============================================ */
.post-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 2.5rem;
  margin-bottom: 2rem;
  box-shadow: var(--shadow-sm);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  border: 1px solid rgba(255, 107, 53, 0.06);
  /* fade-in animation */
  opacity: 0;
  transform: translateY(40px);
}

.post-card.visible {
  opacity: 1;
  transform: translateY(0);
}

.post-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-4px);
  border-color: rgba(255, 107, 53, 0.12);
}

.post-card.visible:hover {
  transform: translateY(-4px);
}

/* Post header: date + category */
.post-header {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  margin-bottom: 1rem;
  flex-wrap: wrap;
}

.post-date {
  font-family: 'Oswald', sans-serif;
  font-size: 0.8rem;
  font-weight: 400;
  letter-spacing: 0.1em;
  color: var(--gray-text);
}

.post-category {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 0.25rem 0.8rem;
  border-radius: 50px;
  color: var(--white);
  line-height: 1;
}

.cat-event { background: var(--orange); }
.cat-info { background: #4A90D9; }
.cat-lesson { background: #4CAF50; }
.cat-all { background: #8B6914; }
.cat-other { background: #9E9E9E; }

/* Post title */
.post-title {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(1.3rem, 3vw, 1.7rem);
  font-weight: 700;
  letter-spacing: 0.03em;
  line-height: 1.3;
  color: var(--dark-text);
  margin-bottom: 1rem;
  position: relative;
}

.post-title::after {
  content: '';
  display: block;
  width: 40px;
  height: 3px;
  background: linear-gradient(90deg, var(--orange), var(--coral));
  border-radius: 3px;
  margin-top: 0.8rem;
}

/* Post image */
.post-image {
  width: 100%;
  border-radius: var(--radius-sm);
  margin-bottom: 1.2rem;
  overflow: hidden;
}

.post-image img {
  width: 100%;
  height: auto;
  display: block;
  object-fit: cover;
  max-height: 400px;
  transition: transform 0.5s ease;
}

.post-card:hover .post-image img {
  transform: scale(1.03);
}

/* Post content */
.post-content {
  font-size: 0.95rem;
  line-height: 2;
  color: var(--gray-text);
  white-space: pre-wrap;
  word-break: break-word;
}

/* ============================================
   BACK TO TOP BUTTON
   ============================================ */
.back-to-top {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  z-index: 999;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--orange), var(--coral));
  color: var(--white);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(255, 107, 53, 0.35);
  opacity: 0;
  visibility: hidden;
  transform: translateY(20px);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.back-to-top.visible {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.back-to-top:hover {
  transform: translateY(-4px) scale(1.08);
  box-shadow: 0 8px 30px rgba(255, 107, 53, 0.45);
}

.back-to-top svg {
  width: 22px;
  height: 22px;
  stroke: var(--white);
  stroke-width: 2.5;
  fill: none;
}

/* ============================================
   FOOTER
   ============================================ */
.footer {
  background: var(--dark-text);
  color: rgba(255,255,255,0.5);
  text-align: center;
  padding: 3rem 2rem;
  font-size: 0.8rem;
  letter-spacing: 0.05em;
  position: relative;
  z-index: 1;
}

.footer-brand {
  font-family: 'Oswald', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.7);
  margin-bottom: 0.5rem;
}

.footer-brand span {
  background: linear-gradient(135deg, var(--orange), var(--coral));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ============================================
   RESPONSIVE
   ============================================ */
@media (max-width: 768px) {
  .navbar {
    padding: 0 1.2rem;
    height: 56px;
  }

  .nav-brand {
    font-size: 0.85rem;
  }

  .nav-back {
    font-size: 0.75rem;
    padding: 0.3rem 0.6rem;
  }

  .nav-badge {
    font-size: 0.65rem;
    padding: 0.3rem 0.8rem;
  }

  .hero {
    padding: 120px 1.5rem 60px;
  }

  .main-content {
    padding: 40px 1rem 80px;
  }

  .post-card {
    padding: 1.8rem 1.5rem;
    margin-bottom: 1.5rem;
    border-radius: 16px;
  }

  .post-title {
    font-size: 1.2rem;
  }

  .post-content {
    font-size: 0.9rem;
  }

  .setup-card {
    padding: 2rem 1.5rem;
  }
}

@media (max-width: 480px) {
  .navbar {
    padding: 0 1rem;
    height: 52px;
  }

  .nav-left {
    gap: 0.6rem;
  }

  .nav-brand {
    font-size: 0.75rem;
  }

  .nav-back {
    font-size: 0.7rem;
  }

  .hero {
    padding: 110px 1rem 50px;
  }

  .hero-title {
    font-size: clamp(2.8rem, 14vw, 4.5rem);
  }

  .main-content {
    padding: 30px 0.8rem 80px;
  }

  .post-card {
    padding: 1.5rem 1.2rem;
    border-radius: 14px;
  }

  .post-header {
    gap: 0.5rem;
  }

  .post-date {
    font-size: 0.75rem;
  }

  .post-title::after {
    margin-top: 0.6rem;
    width: 30px;
    height: 2.5px;
  }

  .post-image img {
    max-height: 250px;
  }

  .back-to-top {
    width: 44px;
    height: 44px;
    bottom: 1.5rem;
    right: 1.5rem;
  }

  .setup-card {
    padding: 1.5rem 1.2rem;
    border-radius: 16px;
  }

  .setup-card h2 {
    font-size: 1.2rem;
  }
}

<!-- ===================== JAVASCRIPT ===================== -->
<script>
// ===== CONFIGURATION =====
const SPREADSHEET_ID = '1M96QizLwfPFPwNXBJHteMCpiVXkV3FIAqXasHAY0Le4';
const NEWS_SHEET = 'KIDSニュース'; // Sheet name
// =========================

// ---- DOM References ----
const postsContainer = document.getElementById('posts-container');
const navbar = document.getElementById('navbar');
const backToTop = document.getElementById('backToTop');

// ---- Category Config ----
const CATEGORY_MAP = {
  'イベント': { cls: 'cat-event',  label: 'イベント' },
  'お知らせ': { cls: 'cat-info',   label: 'お知らせ' },
  'レッスン': { cls: 'cat-lesson', label: 'レッスン' },
  '全体':     { cls: 'cat-all',    label: '全体' },
};

function getCategoryInfo(cat) {
  if (!cat) return null;
  const trimmed = cat.trim();
  return CATEGORY_MAP[trimmed] || { cls: 'cat-other', label: trimmed };
}

// ---- Date Formatter ----
function formatDate(rawDate) {
  if (!rawDate) return '';
  // Try parsing Date(...) format from Google Sheets
  const dateMatch = rawDate.match(/Date\((\d+),(\d+),(\d+)\)/);
  if (dateMatch) {
    const y = parseInt(dateMatch[1]);
    const m = parseInt(dateMatch[2]); // 0-indexed from Google
    const d = parseInt(dateMatch[3]);
    const dt = new Date(y, m, d);
    return formatDateObj(dt);
  }
  // Try regular date string
  const dt = new Date(rawDate);
  if (!isNaN(dt.getTime())) {
    return formatDateObj(dt);
  }
  return rawDate;
}

function formatDateObj(dt) {
  const y = dt.getFullYear();
  const m = String(dt.getMonth() + 1).padStart(2, '0');
  const d = String(dt.getDate()).padStart(2, '0');
  const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
  const w = weekdays[dt.getDay()];
  return y + '.' + m + '.' + d + ' (' + w + ')';
}

// ---- Show Loading ----
function showLoading() {
  postsContainer.innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <p class="loading-text">ニュースを読み込み中...</p>
    </div>
  `;
}

// ---- Show Setup Instructions ----
function showSetup() {
  postsContainer.innerHTML = `
    <div class="setup-card">
      <h2>SETUP REQUIRED</h2>
      <p>Google Spreadsheet との接続設定が必要です。</p>
      <ol>
        <li>Google Spreadsheet を作成し、シート名を <code>${NEWS_SHEET}</code> にしてください。</li>
        <li>スプレッドシートを <strong>「リンクを知っている全員が閲覧可」</strong> に設定してください。</li>
        <li>このHTMLファイルの <code>SPREADSHEET_ID</code> を、スプレッドシートのIDに変更してください。<br>
            <small>URLが <code>https://docs.google.com/spreadsheets/d/<strong>xxxxxxx</strong>/edit</code> なら、太字部分がIDです。</small>
        </li>
      </ol>
      <div class="columns-note">
        <strong>必要な列構成（1行目がヘッダー）:</strong><br>
        A列: 日付 ｜ B列: タイトル ｜ C列: 内容 ｜ D列: カテゴリ ｜ E列: 画像URL
      </div>
    </div>
  `;
}

// ---- Show Empty State ----
function showEmpty() {
  postsContainer.innerHTML = `
    <div class="empty-state">
      <span class="empty-icon">&#128240;</span>
      <p>まだニュースはありません</p>
    </div>
  `;
}

// ---- Show Error State ----
function showError(message) {
  postsContainer.innerHTML = `
    <div class="error-state">
      <div class="error-icon">!</div>
      <p>データの取得に失敗しました</p>
      <p class="error-detail">${message || ''}</p>
      <button class="retry-btn" onclick="fetchAndRender()">RETRY</button>
    </div>
  `;
}

// ---- Render Posts ----
function renderPosts(rows) {
  if (!rows || rows.length === 0) {
    showEmpty();
    return;
  }

  // Reverse for newest first
  const reversed = rows.slice().reverse();

  let html = '';
  reversed.forEach(function(row) {
    const date = row.date || '';
    const title = row.title || '';
    const content = row.content || '';
    const category = row.category || '';
    const imageUrl = row.imageUrl || '';

    const formattedDate = formatDate(date);
    const catInfo = getCategoryInfo(category);

    let catBadge = '';
    if (catInfo) {
      catBadge = '<span class="post-category ' + catInfo.cls + '">' + escapeHtml(catInfo.label) + '</span>';
    }

    let imageBlock = '';
    if (imageUrl) {
      imageBlock = '<div class="post-image"><img src="' + escapeHtml(imageUrl) + '" alt="" loading="lazy"></div>';
    }

    html += `
      <article class="post-card">
        <div class="post-header">
          <span class="post-date">${escapeHtml(formattedDate)}</span>
          ${catBadge}
        </div>
        <h2 class="post-title">${escapeHtml(title)}</h2>
        ${imageBlock}
        <div class="post-content">${escapeHtml(content)}</div>
      </article>
    `;
  });

  postsContainer.innerHTML = html;

  // Trigger IntersectionObserver for fade-in
  observeCards();
}

// ---- HTML Escape ----
function escapeHtml(text) {
  if (!text) return '';
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(text));
  return div.innerHTML;
}

// ---- Parse Google Sheets Response ----
function parseGoogleSheetsResponse(responseText) {
  // Strip JSONP wrapper: google.visualization.Query.setResponse({...})
  var jsonStr = responseText;
  var startIdx = jsonStr.indexOf('(');
  var endIdx = jsonStr.lastIndexOf(')');
  if (startIdx !== -1 && endIdx !== -1) {
    jsonStr = jsonStr.substring(startIdx + 1, endIdx);
  }

  var data = JSON.parse(jsonStr);

  if (data.status === 'error') {
    throw new Error(data.errors ? data.errors.map(function(e) { return e.message; }).join(', ') : 'Unknown error');
  }

  var table = data.table;
  if (!table || !table.rows) return [];

  var rows = [];
  table.rows.forEach(function(row) {
    var cells = row.c || [];

    // Extract cell value, handling various types
    function getCellValue(cell) {
      if (!cell) return '';
      // For dates, Google returns {v: "Date(2024,0,15)", f: "2024/1/15"} etc.
      if (cell.f) return cell.f;
      if (cell.v !== null && cell.v !== undefined) return String(cell.v);
      return '';
    }

    var dateRaw = cells[0] ? (cells[0].v || '') : '';
    var dateFormatted = cells[0] ? (cells[0].f || '') : '';

    rows.push({
      date: dateFormatted || dateRaw,
      title: getCellValue(cells[1]),
      content: getCellValue(cells[2]),
      category: getCellValue(cells[3]),
      imageUrl: getCellValue(cells[4]),
    });
  });

  return rows;
}

// ---- Fetch Data ----
const ALL_NEWS_SHEET = '全体ニュース';

function fetchSheet(sheetName) {
  var encoded = encodeURIComponent(sheetName);
  var url = 'https://docs.google.com/spreadsheets/d/' + SPREADSHEET_ID + '/gviz/tq?tqx=out:json&sheet=' + encoded;
  return fetch(url).then(function(response) {
    if (!response.ok) throw new Error('HTTP ' + response.status);
    return response.text();
  }).then(function(text) {
    return parseGoogleSheetsResponse(text);
  });
}

function fetchAndRender() {
  if (SPREADSHEET_ID === '1M96QizLwfPFPwNXBJHteMCpiVXkV3FIAqXasHAY0Le4' || !SPREADSHEET_ID) {
    showSetup();
    return;
  }

  showLoading();

  Promise.all([
    fetchSheet(NEWS_SHEET),
    fetchSheet(ALL_NEWS_SHEET).catch(function() { return []; })
  ])
    .then(function(results) {
      var merged = results[0].concat(results[1]);
      merged.sort(function(a, b) {
        return new Date(a.date || 0) - new Date(b.date || 0);
      });
      renderPosts(merged);
    })
    .catch(function(err) {
      console.error('Fetch error:', err);
      showError(err.message);
    });
}

// ---- IntersectionObserver for fade-in ----
function observeCards() {
  var cards = document.querySelectorAll('.post-card');
  if (!cards.length) return;

  if (!('IntersectionObserver' in window)) {
    // Fallback: show all immediately
    cards.forEach(function(card) { card.classList.add('visible'); });
    return;
  }

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        // Staggered delay based on index
        var card = entry.target;
        var idx = Array.prototype.indexOf.call(cards, card);
        var delay = Math.min(idx * 80, 400);
        setTimeout(function() {
          card.classList.add('visible');
        }, delay);
        observer.unobserve(card);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });

  cards.forEach(function(card) {
    observer.observe(card);
  });
}

// ---- Navbar scroll effect ----
var lastScrollY = 0;
window.addEventListener('scroll', function() {
  var currentScroll = window.pageYOffset || document.documentElement.scrollTop;

  // Navbar shadow
  if (currentScroll > 20) {
    navbar.classList.add('scrolled');
  } else {
    navbar.classList.remove('scrolled');
  }

  // Back to top button
  if (currentScroll > 500) {
    backToTop.classList.add('visible');
  } else {
    backToTop.classList.remove('visible');
  }

  lastScrollY = currentScroll;
}, { passive: true });

// ---- Back to top click ----
backToTop.addEventListener('click', function() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// ---- Init ----
document.addEventListener('DOMContentLoaded', function() {
  fetchAndRender();
});
</script>

</script>
