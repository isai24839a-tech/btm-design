<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --kids-start: #FF6B35;
  --kids-mid: #FF4D6D;
  --kids-end: #FFD23F;
  --future-start: #0D1B2A;
  --future-mid: #1B2D4F;
  --future-end: #2D1B69;
  --future-gold: #D4A853;
  --white: #ffffff;
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Noto Sans JP', sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* === SPLIT CONTAINER === */
.split-container {
  display: flex;
  height: 100vh;
  width: 100vw;
  position: relative;
}

/* === EACH SIDE === */
.split-side {
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: flex 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden;
  text-decoration: none;
  color: var(--white);
}

.split-side::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.5s ease;
  z-index: 1;
}

/* Hover: expand active side */
.split-container:hover .split-side { flex: 0.7; }
.split-container .split-side:hover { flex: 1.6; }

/* === KIDS SIDE === */
.side-kids {
  background: linear-gradient(135deg, var(--kids-start) 0%, var(--kids-mid) 50%, var(--kids-start) 100%);
  background-size: 200% 200%;
  animation: kidsGradient 8s ease infinite;
}

.side-kids::before {
  background: radial-gradient(ellipse at center, rgba(255,210,63,0.25) 0%, transparent 70%);
}

.side-kids:hover::before { opacity: 1; }

@keyframes kidsGradient {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* === FUTURE SIDE === */
.side-future {
  background: linear-gradient(135deg, var(--future-start) 0%, var(--future-mid) 50%, var(--future-end) 100%);
  background-size: 200% 200%;
  animation: futureGradient 10s ease infinite;
}

.side-future::before {
  background: radial-gradient(ellipse at center, rgba(212,168,83,0.15) 0%, transparent 70%);
}

.side-future:hover::before { opacity: 1; }

@keyframes futureGradient {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* === DIVIDER LINE === */
.split-container::after {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  width: 1px;
  height: 100%;
  background: rgba(255,255,255,0.15);
  z-index: 5;
  transition: left 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
}

/* === CONTENT === */
.side-content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 2rem;
  transform: translateY(0);
  transition: transform 0.5s ease;
}

.split-side:hover .side-content {
  transform: translateY(-10px);
}

.side-label {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(3.5rem, 8vw, 7rem);
  font-weight: 700;
  letter-spacing: 0.08em;
  line-height: 1;
  margin-bottom: 0.3em;
  text-shadow: 0 4px 30px rgba(0,0,0,0.3);
}

.side-future .side-label {
  color: #D4A853;
  text-shadow: 0 4px 30px rgba(212,168,83,0.3);
}

.side-age {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(1rem, 2vw, 1.5rem);
  font-weight: 300;
  letter-spacing: 0.2em;
  opacity: 0.85;
  margin-bottom: 1em;
  border: 1px solid rgba(255,255,255,0.3);
  display: inline-block;
  padding: 0.3em 1.2em;
  border-radius: 50px;
}

.side-tagline {
  font-size: clamp(0.85rem, 1.5vw, 1.1rem);
  font-weight: 300;
  opacity: 0;
  transform: translateY(15px);
  transition: all 0.5s ease 0.1s;
  line-height: 1.8;
  letter-spacing: 0.05em;
}

.split-side:hover .side-tagline {
  opacity: 0.9;
  transform: translateY(0);
}

.side-arrow {
  margin-top: 2rem;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.5s ease 0.2s;
}

.split-side:hover .side-arrow {
  opacity: 1;
  transform: translateY(0);
}

.side-arrow svg {
  width: 48px;
  height: 48px;
  stroke: var(--white);
  stroke-width: 1.5;
  fill: none;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2));
  animation: arrowBounce 2s ease-in-out infinite;
}

@keyframes arrowBounce {
  0%, 100% { transform: translateX(0); }
  50% { transform: translateX(8px); }
}

/* === CENTER LOGO === */
.center-logo {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  text-align: center;
  pointer-events: none;
  mix-blend-mode: difference;
}

.center-logo .logo-text {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(1.5rem, 3vw, 2.5rem);
  font-weight: 700;
  letter-spacing: 0.3em;
  color: var(--white);
  opacity: 0.7;
}

/* === TOP BAR === */
.top-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.5rem 2.5rem;
  pointer-events: none;
}

.top-bar a { pointer-events: auto; }

.brand-name {
  font-family: 'Oswald', sans-serif;
  font-size: 1.1rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: var(--white);
  text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}

.brand-sub {
  font-size: 0.6rem;
  font-weight: 300;
  letter-spacing: 0.3em;
  opacity: 0.6;
  display: block;
}

.top-right {
  display: flex;
  gap: 1.5rem;
  align-items: center;
}

.top-link {
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  font-weight: 400;
  color: var(--white);
  opacity: 0.7;
  transition: all 0.3s;
  text-decoration: none;
  pointer-events: auto;
}

.top-link:hover { opacity: 1; }

.top-link.members-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  opacity: 1;
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  padding: 0.5rem 1.2rem;
  border: 1.5px solid rgba(255,255,255,0.6);
  border-radius: 50px;
  backdrop-filter: blur(8px);
  background: rgba(255,255,255,0.1);
  transition: all 0.3s ease;
}
.top-link.members-btn:hover {
  background: rgba(255,255,255,0.25);
  border-color: rgba(255,255,255,0.9);
  transform: translateY(-1px);
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

/* === BOTTOM BAR === */
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.5rem 2.5rem;
  pointer-events: none;
}

.bottom-logo {
  position: fixed;
  bottom: 1.2rem;
  right: 2rem;
}

.bottom-tagline {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(1rem, 1.8vw, 1.3rem);
  letter-spacing: 0.12em;
  color: var(--white);
  opacity: 0.6;
  text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}

.bottom-logo {
  width: 60px;
  height: auto;
  opacity: 0.5;
  filter: drop-shadow(0 1px 4px rgba(0,0,0,0.3));
}

/* === FLOATING SHAPES (KIDS) === */
.shape {
  position: absolute;
  border-radius: 50%;
  opacity: 0.15;
  pointer-events: none;
  z-index: 0;
}

.side-kids .shape-1 {
  width: 200px; height: 200px;
  background: var(--kids-end);
  top: 10%; left: 10%;
  animation: float1 12s ease-in-out infinite;
}
.side-kids .shape-2 {
  width: 120px; height: 120px;
  background: var(--white);
  bottom: 20%; right: 15%;
  animation: float2 10s ease-in-out infinite;
}
.side-kids .shape-3 {
  width: 80px; height: 80px;
  background: var(--kids-mid);
  top: 60%; left: 20%;
  animation: float3 8s ease-in-out infinite;
}

/* === FLOATING PARTICLES (FUTURE) === */
.particle {
  position: absolute;
  width: 4px; height: 4px;
  background: var(--future-gold);
  border-radius: 50%;
  opacity: 0;
  pointer-events: none;
  z-index: 0;
  animation: sparkle 4s ease-in-out infinite;
}

.side-future .particle:nth-child(1) { top: 15%; left: 20%; animation-delay: 0s; }
.side-future .particle:nth-child(2) { top: 30%; left: 60%; animation-delay: 0.7s; }
.side-future .particle:nth-child(3) { top: 55%; left: 35%; animation-delay: 1.4s; }
.side-future .particle:nth-child(4) { top: 70%; left: 70%; animation-delay: 2.1s; }
.side-future .particle:nth-child(5) { top: 85%; left: 25%; animation-delay: 2.8s; }
.side-future .particle:nth-child(6) { top: 25%; left: 80%; animation-delay: 0.3s; }
.side-future .particle:nth-child(7) { top: 45%; left: 50%; animation-delay: 1.8s; }
.side-future .particle:nth-child(8) { top: 75%; left: 45%; animation-delay: 3.2s; }

@keyframes float1 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(30px, -20px) scale(1.1); }
  66% { transform: translate(-20px, 20px) scale(0.95); }
}
@keyframes float2 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-25px, -30px); }
}
@keyframes float3 {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  50% { transform: translate(20px, -15px) rotate(180deg); }
}
@keyframes sparkle {
  0%, 100% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 0.6; transform: scale(1.5); }
}

/* === SIDE BACKGROUND PHOTOS === */
.side-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  opacity: 0.25;
  z-index: 0;
  transition: opacity 0.7s ease;
}
.split-side:hover .side-bg {
  opacity: 0.4;
}
.side-future .side-bg {
  background-position: 25% center;
}

/* === LOAD ANIMATION === */
.split-side .side-content {
  opacity: 0;
  animation: fadeSlideUp 1s ease forwards;
}
.side-kids .side-content { animation-delay: 0.3s; }
.side-future .side-content { animation-delay: 0.5s; }

@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .split-container {
    flex-direction: column;
  }

  .split-container::after {
    top: 50%;
    left: 0;
    width: 100%;
    height: 1px;
  }

  .split-container:hover .split-side { flex: 1; }
  .split-container .split-side:hover { flex: 1; }

  .side-tagline { opacity: 0.8 !important; transform: none !important; }
  .side-arrow { opacity: 1 !important; transform: none !important; }
  .side-arrow svg { width: 36px; height: 36px; }

  .center-logo { display: none; }

  .top-bar { padding: 1rem 1.5rem; }
  .bottom-bar { display: none; }

  .side-content { padding: 1.5rem; }
}

@media (max-width: 480px) {
  .side-label { font-size: 2.8rem; }
  .side-age { font-size: 0.8rem; padding: 0.2em 0.8em; }
  .top-right { gap: 0.8rem; }
  .top-link { font-size: 0.65rem; }
}

/* === DESKTOP SPARKLE EFFECTS === */
@media (hover: hover) and (min-width: 769px) {
  .mouse-glow {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    transform: translate(-50%, -50%);
    transition: opacity 0.4s ease;
  }
  .side-kids .mouse-glow {
    background: radial-gradient(circle, rgba(255,210,63,0.25) 0%, rgba(255,107,53,0.08) 40%, transparent 70%);
  }
  .side-future .mouse-glow {
    background: radial-gradient(circle, rgba(212,168,83,0.3) 0%, rgba(45,27,105,0.1) 40%, transparent 70%);
  }

  /* Enhanced hover: side content shine sweep */
  .split-side::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.12) 45%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0.12) 55%, transparent 60%);
    background-size: 250% 100%;
    background-position: 200% 0;
    transition: background-position 0.8s ease;
    pointer-events: none;
    z-index: 2;
  }
  .split-side:hover::after {
    background-position: -50% 0;
  }

  /* Arrow glow on hover */
  .split-side:hover .side-arrow svg {
    filter: drop-shadow(0 0 12px rgba(255,255,255,0.6));
  }

  /* Bottom logo subtle glow */
  .bottom-logo {
    transition: filter 0.3s ease;
  }
  .bottom-logo:hover {
    filter: drop-shadow(0 0 20px rgba(212,168,83,0.5));
  }
}

/* === MOBILE PERFORMANCE === */
@media (max-width: 768px) {
  /* Keep 1 shape on KIDS, 4 particles on FUTURE */
  .shape:nth-child(n+2) { display: none; }
  .particle:nth-child(n+5) { display: none; }
  .particle { opacity: 0.3; }
  .side-bg { will-change: auto; }
}

@media (prefers-reduced-motion: reduce) {
  .shape, .particle { display: none; }
  .side-kids, .side-future { animation: none; }
  .side-arrow svg { animation: none; }
  .side-content { animation: none; opacity: 1; transform: none; }
}
</style>

    <img src="images/btm_logo.png" alt="BTM" class="bottom-logo" decoding="async">
  </picture>
</div>

<script>
// Desktop-only: mouse-following glow effect
if (window.matchMedia('(hover: hover) and (min-width: 769px)').matches) {
  document.querySelectorAll('.split-side').forEach(function(side) {
    var glow = document.createElement('div');
    glow.className = 'mouse-glow';
    side.appendChild(glow);
    side.addEventListener('mousemove', function(e) {
      var rect = side.getBoundingClientRect();
      glow.style.left = (e.clientX - rect.left) + 'px';
      glow.style.top = (e.clientY - rect.top) + 'px';
      glow.style.opacity = '1';
    });
    side.addEventListener('mouseleave', function() {
      glow.style.opacity = '0';
    });
  });
}
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js').catch(function() {});
}
</script>
</body>
</html>
